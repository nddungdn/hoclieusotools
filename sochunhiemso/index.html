<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="description" content="Sổ chủ nhiệm số kết nối GVCN, học sinh và cha mẹ học sinh." />
  <title>Sổ chủ nhiệm số</title>

  <!-- Tệp cài ứng dụng PWA -->
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#dbe4f0;
      --primary:#2563eb;
      --primary-dark:#1d4ed8;
      --primary-soft:#dbeafe;
      --success:#16a34a;
      --warning:#f59e0b;
      --danger:#dc2626;
      --radius:18px;
      --shadow:0 14px 32px rgba(15,23,42,.08);
      --shadow-soft:0 8px 20px rgba(15,23,42,.06);
      --focus:0 0 0 4px rgba(37,99,235,.16);
      --max:1160px;
      --font:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    html,body{
      max-width:100%;
      overflow-x:hidden;
    }

    body{
      margin:0;
      min-height:100vh;
      font-family:var(--font);
      background:
        radial-gradient(circle at top left,rgba(37,99,235,.13),transparent 34rem),
        linear-gradient(180deg,#f8fbff 0%,var(--bg) 70%);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    .hidden{display:none!important}
    .muted{color:var(--muted)}
    .danger-text{color:var(--danger)}
    .success-text{color:var(--success)}
    .warning-text{color:#b45309}

    .progress-hero{
      display:grid;
      grid-template-columns:auto minmax(0,1fr);
      gap:18px;
      align-items:center;
      background:linear-gradient(135deg,#eff6ff 0%,#ecfdf5 100%);
      border:1px solid #bfdbfe;
      border-radius:22px;
      padding:20px;
    }

    .progress-level-ring{
      width:104px;
      height:104px;
      border-radius:50%;
      display:grid;
      place-items:center;
      text-align:center;
      background:linear-gradient(135deg,#2563eb,#14b8a6);
      color:#fff;
      box-shadow:0 14px 28px rgba(37,99,235,.22);
      flex:0 0 auto;
    }

    .progress-level-ring strong{font-size:1.7rem;line-height:1}
    .progress-level-ring span{font-size:.72rem;font-weight:800;margin-top:3px}
    .progress-level-name{font-size:1.35rem;font-weight:900;margin:0 0 5px}
    .progress-track{height:12px;border-radius:999px;background:#dbeafe;overflow:hidden;margin:10px 0 6px}
    .progress-track > span{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#2563eb,#14b8a6)}

    .progress-category-grid{
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      gap:10px;
      margin-top:14px;
    }

    .progress-category{
      border:1px solid var(--line);
      border-radius:16px;
      padding:13px 10px;
      background:#fff;
      text-align:center;
    }

    .progress-category .icon{font-size:1.35rem}
    .progress-category strong{display:block;font-size:1.15rem;margin:3px 0}
    .progress-category span{font-size:.78rem;color:var(--muted);font-weight:750}

    .progress-student-picker{
      display:grid;
      grid-template-columns:minmax(220px,1fr) auto;
      gap:10px;
      align-items:end;
    }

    .progress-overview-list{display:grid;gap:8px;max-height:480px;overflow:auto;padding-right:2px}
    .progress-person{
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      gap:10px;
      align-items:center;
      padding:11px 12px;
      border:1px solid var(--line);
      border-radius:14px;
      background:#fff;
    }
    .progress-person.needs{border-color:#fde68a;background:#fffbeb}
    .progress-person button{white-space:nowrap}

    .progress-goal-card{
      border:1px solid #c7d2fe;
      background:#eef2ff;
      border-radius:17px;
      padding:15px;
      line-height:1.55;
    }

    .progress-timeline{display:grid;gap:10px}
    .progress-entry{
      border-left:4px solid #60a5fa;
      background:#f8fafc;
      border-radius:0 15px 15px 0;
      padding:12px 14px;
    }
    .progress-entry.parent{border-left-color:#34d399;background:#f0fdf4}
    .progress-entry.reflection{border-left-color:#a78bfa;background:#faf5ff}
    .progress-entry-head{display:flex;gap:8px;justify-content:space-between;align-items:flex-start}
    .progress-entry p{white-space:pre-wrap;margin:8px 0 0;line-height:1.55}
    .progress-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
    .progress-privacy{font-size:.8rem;color:var(--muted);margin-top:8px}

    @media (max-width:900px){
      .progress-category-grid{grid-template-columns:repeat(3,minmax(0,1fr))}
    }

    @media (max-width:560px){
      .progress-hero{grid-template-columns:1fr;text-align:center;padding:16px}
      .progress-level-ring{margin:0 auto;width:92px;height:92px}
      .progress-category-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .progress-student-picker{grid-template-columns:1fr}
      .progress-person{grid-template-columns:1fr}
      .progress-entry-head{display:block}
    }

    .app-shell{
      width:min(var(--max),calc(100% - 28px));
      margin:0 auto;
      padding:18px 0 28px;
    }

    .login-wrap{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:18px;
    }

    .login-card{
      width:min(470px,100%);
      background:rgba(255,255,255,.94);
      backdrop-filter:blur(18px);
      border:1px solid rgba(219,228,240,.9);
      border-radius:26px;
      box-shadow:var(--shadow);
      padding:24px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
    }

    .brand-mark{
      width:48px;
      height:48px;
      border-radius:16px;
      background:linear-gradient(135deg,#2563eb,#38bdf8);
      color:#fff;
      display:grid;
      place-items:center;
      font-weight:900;
      box-shadow:0 12px 24px rgba(37,99,235,.25);
      flex:0 0 auto;
    }

    .brand h1{
      font-size:1.35rem;
      line-height:1.2;
      margin:0;
    }

    .brand p{
      margin:4px 0 0;
      font-size:.92rem;
      color:var(--muted);
    }

    .form-grid{display:grid;gap:12px}
    .field label{
      display:block;
      font-size:.86rem;
      font-weight:750;
      margin-bottom:6px;
      color:#334155;
    }

    .input,.select,.textarea{
      width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px 13px;
      background:#fff;
      color:var(--text);
      outline:none;
      transition:.16s ease;
    }

    .textarea{
      min-height:112px;
      resize:vertical;
      line-height:1.55;
    }

    .input:focus,.select:focus,.textarea:focus{
      border-color:var(--primary);
      box-shadow:var(--focus);
    }

    .btn{
      border:0;
      border-radius:14px;
      padding:11px 14px;
      background:#e2e8f0;
      color:#0f172a;
      font-weight:800;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition:.16s ease;
      min-height:44px;
      text-decoration:none;
    }

    .btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-soft)}
    .btn:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-primary:hover{background:var(--primary-dark)}
    .btn-soft{background:var(--primary-soft);color:#1e40af}
    .btn-danger{background:#fee2e2;color:#991b1b}
    .btn-success{background:#dcfce7;color:#166534}
    .btn-ghost{background:transparent;color:#334155;border:1px solid var(--line)}
    .btn-small{min-height:36px;padding:8px 11px;border-radius:12px;font-size:.9rem}
    .full{width:100%}

    .login-actions{
      display:flex;
      gap:10px;
      align-items:center;
      margin-top:14px;
      flex-wrap:wrap;
    }

    .link-btn{
      background:none;
      border:0;
      color:var(--primary);
      padding:0;
      font-weight:800;
      text-decoration:none;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:20;
      background:rgba(244,247,251,.84);
      backdrop-filter:blur(16px);
      border-bottom:1px solid rgba(219,228,240,.72);
      margin:0 -14px 18px;
      padding:12px 14px;
    }

    .topbar-inner{
      width:min(var(--max),100%);
      margin:0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .user-pill{
      display:flex;
      align-items:center;
      gap:10px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:999px;
      padding:7px 10px;
      box-shadow:0 6px 14px rgba(15,23,42,.04);
      min-width:0;
    }

    .avatar{
      width:34px;
      height:34px;
      border-radius:50%;
      background:linear-gradient(135deg,#2563eb,#7c3aed);
      color:#fff;
      display:grid;
      place-items:center;
      font-weight:900;
      flex:0 0 auto;
    }

    .user-pill strong,.user-pill span{
      display:block;
      max-width:250px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .user-pill strong{font-size:.92rem}
    .user-pill span{font-size:.78rem;color:var(--muted)}

    .top-actions{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .nav{
      display:flex;
      gap:8px;
      overflow:auto;
      padding:0 0 12px;
      margin-bottom:4px;
      -webkit-overflow-scrolling:touch;
    }

    .nav button{
      border:1px solid var(--line);
      background:#fff;
      color:#334155;
      border-radius:999px;
      padding:10px 14px;
      font-weight:800;
      white-space:nowrap;
      min-height:42px;
      transition:.15s ease;
    }

    .nav button.active{
      background:var(--primary);
      border-color:var(--primary);
      color:#fff;
      box-shadow:0 10px 18px rgba(37,99,235,.18);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(12,1fr);
      gap:14px;
    }

    .col-12{grid-column:span 12}
    .col-8{grid-column:span 8}
    .col-6{grid-column:span 6}
    .col-4{grid-column:span 4}
    .col-3{grid-column:span 3}

    .card{
      background:rgba(255,255,255,.95);
      border:1px solid rgba(219,228,240,.96);
      border-radius:var(--radius);
      box-shadow:var(--shadow-soft);
      padding:16px;
    }

    .card-title{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
    }

    .card h2,.card h3{
      margin:0;
      line-height:1.25;
    }

    .card h2{font-size:1.12rem}
    .card h3{font-size:1rem}
    .card p{line-height:1.6}

    .stat{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .stat-icon{
      width:44px;
      height:44px;
      border-radius:16px;
      display:grid;
      place-items:center;
      background:var(--primary-soft);
      color:var(--primary);
      font-weight:900;
      flex:0 0 auto;
    }

    .stat-value{
      font-size:1.55rem;
      font-weight:900;
      line-height:1;
    }

    .stat-label{
      color:var(--muted);
      font-size:.9rem;
      margin-top:4px;
    }

    .list{
      display:grid;
      gap:10px;
    }

    .item{
      border:1px solid var(--line);
      background:#fff;
      border-radius:16px;
      padding:12px;
      transition:.15s ease;
    }

    .item:hover{box-shadow:0 8px 18px rgba(15,23,42,.05)}

    .item-row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
    }

    .item-title{
      font-weight:900;
      margin:0 0 4px;
    }

    .item-meta{
      color:var(--muted);
      font-size:.86rem;
      line-height:1.45;
    }

    .item-content{
      margin:8px 0 0;
      color:#334155;
      line-height:1.55;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:5px;
      border-radius:999px;
      padding:5px 9px;
      font-weight:800;
      font-size:.78rem;
      background:#e2e8f0;
      color:#334155;
      white-space:nowrap;
    }

    .badge-blue{background:#dbeafe;color:#1e40af}
    .badge-green{background:#dcfce7;color:#166534}
    .badge-yellow{background:#fef3c7;color:#92400e}
    .badge-red{background:#fee2e2;color:#991b1b}
    .badge-purple{background:#ede9fe;color:#5b21b6}

    .notice-page-list{
      display:grid;
      gap:14px;
    }

    .class-notice-card{
      border:1px solid var(--line);
      border-radius:18px;
      background:#fff;
      padding:16px;
      box-shadow:0 7px 20px rgba(15,23,42,.05);
    }

    .class-notice-card.important{
      border-color:#fb7185;
      background:linear-gradient(135deg,#fff5f6,#fff);
    }

    .class-notice-card.expired{
      opacity:.72;
      background:#f8fafc;
    }

    .class-notice-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
    }

    .class-notice-head h3{
      margin:7px 0 0;
      font-size:1.08rem;
      line-height:1.4;
    }

    .class-notice-content{
      margin-top:13px;
      white-space:pre-wrap;
      line-height:1.65;
      overflow-wrap:anywhere;
    }

    .class-notice-meta{
      display:flex;
      flex-wrap:wrap;
      gap:7px 12px;
      color:var(--muted);
      font-size:.82rem;
      margin-top:12px;
    }

    .class-notice-footer{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      margin-top:14px;
      padding-top:12px;
      border-top:1px solid var(--line);
    }

    .notice-confirm-summary{
      font-weight:850;
      color:#334155;
    }

    .notice-actions{
      display:flex;
      gap:7px;
      flex-wrap:wrap;
    }

    .confirmation-list{
      display:grid;
      gap:8px;
      margin-top:14px;
    }

    .confirmation-row{
      display:grid;
      grid-template-columns:minmax(0,1fr) minmax(120px,.5fr) auto;
      align-items:center;
      gap:10px;
      border:1px solid var(--line);
      border-radius:13px;
      padding:10px 12px;
    }

    .confirmation-row.pending{
      background:#fffaf0;
      border-color:#fed7aa;
    }

    .operations-grid{
      display:grid;
      grid-template-columns:repeat(12,minmax(0,1fr));
      gap:14px;
    }

    .operations-grid > .ops-half{grid-column:span 6}
    .operations-grid > .ops-full{grid-column:span 12}

    .health-summary{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:10px;
      margin:14px 0;
    }

    .health-metric{
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      background:#f8fafc;
      text-align:center;
    }

    .health-metric b{display:block;font-size:1.25rem;margin-bottom:3px}

    .health-issue{
      border-left:4px solid #f59e0b;
      background:#fffbeb;
      border-radius:10px;
      padding:10px 12px;
      margin-top:8px;
      line-height:1.5;
    }

    .health-issue.error{border-color:#ef4444;background:#fff1f2}

    .backup-row{
      display:grid;
      grid-template-columns:minmax(0,1.5fr) minmax(120px,.6fr) auto;
      gap:10px;
      align-items:center;
      padding:11px 0;
      border-bottom:1px solid var(--line);
    }

    .backup-row:last-child{border-bottom:0}

    .danger-zone{
      border:1px solid #fecaca;
      background:#fff7f7;
    }

    @media (max-width:700px){
      .class-notice-head,
      .class-notice-footer{
        display:grid;
        grid-template-columns:1fr;
      }
      .notice-actions{
        display:grid;
        grid-template-columns:repeat(2,minmax(0,1fr));
        width:100%;
      }
      .notice-actions .btn{
        width:100%;
      }
      .confirmation-row{
        grid-template-columns:1fr;
        gap:5px;
      }
      .operations-grid > .ops-half,.operations-grid > .ops-full{grid-column:span 12}
      .health-summary{grid-template-columns:repeat(2,minmax(0,1fr))}
      .backup-row{grid-template-columns:1fr}
    }

    .split{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .toolbar{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      margin-bottom:12px;
    }

    .notice{
      border:1px solid #bfdbfe;
      background:#eff6ff;
      color:#1e3a8a;
      border-radius:16px;
      padding:12px;
      line-height:1.55;
      margin-bottom:12px;
    }

    .notice.warn{
      border-color:#fde68a;
      background:#fffbeb;
      color:#92400e;
    }

    .notice.danger{
      border-color:#fecaca;
      background:#fef2f2;
      color:#991b1b;
    }

    .table-wrap{
      width:100%;
      overflow:auto;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:720px;
    }

    th,td{
      padding:11px 12px;
      border-bottom:1px solid var(--line);
      text-align:left;
      vertical-align:top;
      font-size:.92rem;
    }

    th{
      background:#f8fafc;
      font-size:.8rem;
      color:#475569;
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    tr:last-child td{border-bottom:0}

    .modal-backdrop{
      position:fixed;
      inset:0;
      z-index:100;
      background:rgba(15,23,42,.46);
      display:grid;
      place-items:center;
      padding:16px;
    }

    .modal{
      width:min(600px,100%);
      max-height:min(86vh,760px);
      overflow:auto;
      background:#fff;
      border-radius:24px;
      border:1px solid var(--line);
      box-shadow:0 24px 70px rgba(15,23,42,.24);
      padding:18px;
    }

    .modal-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:12px;
    }

    .modal-head h2{
      margin:0;
      font-size:1.16rem;
      line-height:1.25;
    }

    .close{
      border:0;
      background:#f1f5f9;
      width:38px;
      height:38px;
      border-radius:50%;
      font-size:1.2rem;
      line-height:1;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      z-index:200;
      width:min(540px,calc(100% - 28px));
      background:#0f172a;
      color:#fff;
      border-radius:16px;
      padding:12px 14px;
      box-shadow:0 18px 44px rgba(15,23,42,.28);
      display:flex;
      gap:10px;
      align-items:flex-start;
      line-height:1.45;
    }

    .toast.error{background:#991b1b}
    .toast.success{background:#166534}
    .toast.warn{background:#92400e}

    .loader{
      width:18px;
      height:18px;
      border-radius:50%;
      border:3px solid rgba(255,255,255,.4);
      border-top-color:#fff;
      animation:spin .8s linear infinite;
      flex:0 0 auto;
      margin-top:1px;
    }

    @keyframes spin{to{transform:rotate(360deg)}}

    .empty{
      color:var(--muted);
      text-align:center;
      padding:24px 10px;
      border:1px dashed var(--line);
      border-radius:16px;
      background:#f8fafc;
    }

    .footer-note{
      margin:24px 0 0;
      color:var(--muted);
      font-size:.86rem;
      text-align:center;
      line-height:1.55;
    }



    .dashboard-skeleton{
      display:grid;
      gap:12px;
    }

    .skeleton-line{
      height:16px;
      border-radius:999px;
      background:linear-gradient(90deg,#e2e8f0 25%,#f8fafc 50%,#e2e8f0 75%);
      background-size:200% 100%;
      animation:skeleton 1.25s infinite linear;
    }

    @keyframes skeleton{
      to{background-position:-200% 0}
    }

    .timetable-status{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
      border:1px solid #bfdbfe;
      background:linear-gradient(135deg,#eff6ff,#f8fbff);
      border-radius:18px;
      padding:15px;
      margin-bottom:14px;
    }

    .timetable-status-main{
      display:flex;
      align-items:flex-start;
      gap:12px;
      min-width:0;
    }

    .timetable-status-icon{
      width:48px;
      height:48px;
      border-radius:16px;
      display:grid;
      place-items:center;
      background:#dbeafe;
      color:#1d4ed8;
      font-size:1.35rem;
      flex:0 0 auto;
    }

    .timetable-status-title{
      font-weight:900;
      font-size:1.05rem;
      line-height:1.35;
    }

    .timetable-status-note{
      color:var(--muted);
      margin-top:4px;
      line-height:1.5;
      font-size:.9rem;
    }

    .weekly-change-panel{
      border:1px solid #fed7aa;
      background:linear-gradient(135deg,#fff7ed,#fffdf8);
      border-radius:18px;
      padding:15px;
      margin:14px 0;
    }

    .weekly-change-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .weekly-change-head h3{
      margin:0;
      color:#9a3412;
    }

    .timetable-week-nav{
      display:flex;
      align-items:center;
      gap:7px;
      flex-wrap:wrap;
    }

    .weekly-change-list{
      display:grid;
      gap:9px;
      margin-top:12px;
    }

    .weekly-change-item{
      display:grid;
      grid-template-columns:minmax(110px,.75fr) minmax(0,2fr) auto;
      gap:12px;
      align-items:center;
      padding:11px 12px;
      border:1px solid #fed7aa;
      border-radius:14px;
      background:#fff;
    }

    .weekly-change-item.important{
      border-color:#fb7185;
      background:#fff5f6;
    }

    .weekly-change-date{
      color:#9a3412;
      font-weight:900;
      line-height:1.35;
    }

    .weekly-change-content{
      min-width:0;
      line-height:1.45;
      overflow-wrap:anywhere;
    }

    .weekly-change-type{
      display:inline-block;
      margin-right:6px;
      color:#c2410c;
      font-weight:900;
    }

    .weekly-change-actions{
      display:flex;
      gap:6px;
    }

    .weekly-change-empty{
      margin-top:12px;
      padding:12px;
      border-radius:13px;
      background:rgba(255,255,255,.75);
      color:#78716c;
      text-align:center;
    }

    .day-header-date{
      display:block;
      margin-top:3px;
      font-size:.72rem;
      font-weight:700;
      opacity:.82;
    }

    .slot-change-badge{
      display:block;
      margin-top:5px;
      border-radius:7px;
      padding:4px 6px;
      background:#ffedd5;
      border:1px solid #fdba74;
      color:#9a3412;
      font-size:.72rem;
      font-weight:850;
      line-height:1.3;
      overflow-wrap:anywhere;
    }

    .slot-change-badge.important{
      background:#ffe4e6;
      border-color:#fda4af;
      color:#9f1239;
    }

    .timetable-weekly td.has-change{
      background:#fffaf0;
      box-shadow:inset 0 0 0 2px #fdba74;
    }

    .mobile-day-changes{
      display:grid;
      gap:8px;
      margin-bottom:12px;
    }

    .timetable-toolbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
      margin:14px 0;
    }

    .timetable-toolbar .btn-download{
      background:#ec2581;
      color:#fff;
      box-shadow:0 8px 18px rgba(236,37,129,.18);
    }

    .timetable-toolbar .btn-save-schedule{
      background:#40c556;
      color:#fff;
      box-shadow:0 8px 18px rgba(64,197,86,.18);
    }

    .timetable-capture-card{
      background:#fff;
      border:1px solid #e2e8f0;
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 8px 24px rgba(15,23,42,.06);
    }

    .timetable-capture-title{
      display:none;
      padding:14px 18px 0;
      text-align:center;
      font-weight:900;
      color:#581c87;
      font-size:1.15rem;
    }

    .timetable-weekly{
      overflow:auto;
      background:#fff;
    }

    .timetable-weekly table{
      min-width:1120px;
      width:100%;
      border-collapse:separate;
      border-spacing:0;
      table-layout:fixed;
    }

    .timetable-weekly th,
    .timetable-weekly td{
      border-right:1px solid #dce3ed;
      border-bottom:1px solid #dce3ed;
      padding:9px 10px;
      text-align:center;
      vertical-align:middle;
      background:#fff;
      height:48px;
    }

    .timetable-weekly th:last-child,
    .timetable-weekly td:last-child{
      border-right:0;
    }

    .timetable-weekly thead th{
      background:linear-gradient(180deg,#7e22ce,#6d18b5);
      color:#fff;
      font-weight:900;
      text-transform:none;
      letter-spacing:0;
      font-size:.92rem;
      border-color:rgba(255,255,255,.18);
    }

    .timetable-weekly thead th:first-child{
      border-top-left-radius:16px;
      width:88px;
      min-width:88px;
    }

    .timetable-weekly thead th:nth-child(2){
      width:58px;
      min-width:58px;
    }

    .timetable-weekly thead th:nth-child(3){
      width:118px;
      min-width:118px;
    }

    .timetable-weekly thead th:last-child{
      border-top-right-radius:16px;
    }

    .timetable-weekly .session-cell{
      width:88px;
      min-width:88px;
      background:#fff;
      color:#ec2581;
      font-weight:900;
      padding:8px 10px;
      text-align:center;
      vertical-align:middle;
      white-space:nowrap;
    }

    .timetable-weekly .session-cell span{
      display:inline-block;
      writing-mode:horizontal-tb;
      text-orientation:mixed;
      letter-spacing:0;
      line-height:1.2;
      white-space:nowrap;
    }

    .timetable-weekly .period-column{
      color:#ec2581;
      font-weight:900;
      font-size:1rem;
    }

    .timetable-weekly .time-column{
      white-space:nowrap;
      color:#475569;
      font-weight:750;
      font-size:.82rem;
      background:#fbfcfe;
    }

    .timetable-weekly .subject-cell{
      padding:8px 12px;
      background:#fff;
    }

    .subject-chip{
      display:block;
      width:100%;
      min-height:28px;
      border-radius:7px;
      padding:4px 8px;
      font-weight:850;
      line-height:1.25;
      border:1px solid transparent;
      box-shadow:0 2px 4px rgba(15,23,42,.08);
      overflow-wrap:anywhere;
    }

    .subject-blue{background:#dbeafe;border-color:#b7d4ff;color:#1d4ed8}
    .subject-orange{background:#fff1d8;border-color:#f7ca88;color:#9a3d00}
    .subject-purple{background:#f1e7ff;border-color:#dfc8ff;color:#6b21a8}
    .subject-green{background:#ddfbe4;border-color:#b4ecc0;color:#166534}
    .subject-gray{background:#f3f4f6;border-color:#d9dde4;color:#111827}
    .subject-pink{background:#ffe4f1;border-color:#ffc0de;color:#be185d}
    .subject-teal{background:#dff8f5;border-color:#b6e9e3;color:#0f766e}

    .timetable-weekly td.current-cell{
      background:#fff7cc;
      box-shadow:inset 0 0 0 3px #f59e0b;
    }

    .timetable-weekly tr.break-after-row td{
      border-bottom:3px solid #f4c244;
    }

    .timetable-note-row td{
      background:#f7fbff;
      height:auto;
      min-height:50px;
      text-align:left;
    }

    .timetable-note-label{
      color:#2563eb;
      font-weight:900;
      white-space:nowrap;
    }

    .timetable-note-content{
      color:#3730a3;
      font-style:italic;
      font-weight:650;
      line-height:1.5;
    }

    .timetable-mobile{
      display:none;
      margin-top:14px;
    }

    .export-clone{
      position:fixed;
      left:-10000px;
      top:0;
      width:1400px;
      max-width:none;
      z-index:-1;
      background:#fff;
      padding:24px;
    }

    .export-clone .timetable-capture-title{
      display:block;
    }

    .export-clone .timetable-weekly{
      display:block !important;
      overflow:visible !important;
    }

    .export-clone .timetable-weekly table{
      min-width:0;
      width:100%;
    }

    .timetable-day-nav{
      display:grid;
      grid-template-columns:44px minmax(0,1fr) 44px;
      align-items:center;
      gap:8px;
      margin-bottom:12px;
    }

    .timetable-day-title{
      text-align:center;
      font-weight:900;
      font-size:1.08rem;
    }

    .timetable-day-subtitle{
      color:var(--muted);
      font-size:.82rem;
      text-align:center;
      margin-top:3px;
    }

    .timetable-swipe{
      touch-action:pan-y;
      user-select:none;
    }

    .timetable-period-list{
      display:grid;
      gap:9px;
    }

    .timetable-period{
      display:grid;
      grid-template-columns:76px minmax(0,1fr) auto;
      gap:10px;
      align-items:center;
      border:1px solid var(--line);
      background:#fff;
      border-radius:15px;
      padding:11px;
    }

    .timetable-period.active{
      border-color:#60a5fa;
      background:#eff6ff;
      box-shadow:0 8px 18px rgba(37,99,235,.09);
    }

    .timetable-period.has-change{
      border-color:#fdba74;
      background:#fffaf0;
    }

    .timetable-period.break-marker{
      margin-bottom:18px;
      position:relative;
    }

    .timetable-period.break-marker::after{
      content:'Ra chơi';
      position:absolute;
      left:50%;
      bottom:-17px;
      transform:translateX(-50%);
      color:#92400e;
      background:#fef3c7;
      border-radius:999px;
      padding:3px 10px;
      font-size:.72rem;
      font-weight:900;
      white-space:nowrap;
    }

    .period-label{
      font-weight:900;
      color:#334155;
    }

    .period-subject{
      font-weight:850;
      overflow-wrap:anywhere;
    }

    .period-time{
      color:var(--muted);
      font-size:.78rem;
      white-space:nowrap;
    }

    .swipe-hint{
      text-align:center;
      color:var(--muted);
      font-size:.78rem;
      margin-top:10px;
    }

    .timetable-editor-grid{
      display:grid;
      gap:10px;
    }

    .timetable-editor-row{
      display:grid;
      grid-template-columns:95px 74px minmax(0,1fr);
      gap:9px;
      align-items:center;
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px;
      background:#fff;
    }

    .timetable-time-row{
      display:grid;
      grid-template-columns:95px 58px minmax(110px,1fr) minmax(110px,1fr);
      gap:8px;
      align-items:center;
      border-bottom:1px solid var(--line);
      padding:9px 0;
    }

    .page,
    .grid,
    .card,
    .card-title > *,
    .table-wrap{
      min-width:0;
      max-width:100%;
    }

    .compact-table{
      min-width:0;
      table-layout:fixed;
    }

    .ai-stat-summary{
      display:grid;
      grid-template-columns:repeat(12,minmax(0,1fr));
      gap:14px;
    }

    .ai-stat-summary > .col-3{
      grid-column:span 3;
    }

    .compact-table th,
    .compact-table td{
      overflow-wrap:anywhere;
      word-break:break-word;
    }

    @media (max-width:700px){
      .timetable-weekly{display:none}
      .timetable-toolbar{display:grid;grid-template-columns:1fr 1fr}
      .timetable-toolbar .btn{width:100%}
      .timetable-capture-card{border:0;box-shadow:none;overflow:visible}
      .timetable-mobile{display:block}
      .timetable-status{flex-direction:column}
      .timetable-status > .btn{width:100%}
      .timetable-period{
        grid-template-columns:66px minmax(0,1fr);
      }
      .period-time{
        grid-column:2;
      }
      .timetable-editor-row{
        grid-template-columns:80px 54px minmax(0,1fr);
      }
      .timetable-time-row{
        grid-template-columns:72px 44px minmax(0,1fr) minmax(0,1fr);
      }
      .weekly-change-item{
        grid-template-columns:1fr;
        gap:7px;
      }
      .weekly-change-actions{
        width:100%;
      }
      .weekly-change-actions .btn{
        flex:1;
      }
      .timetable-week-nav{
        width:100%;
        display:grid;
        grid-template-columns:40px minmax(0,1fr) 40px;
      }
      .student-header-actions{
        width:100%;
        display:grid !important;
        grid-template-columns:repeat(2,minmax(0,1fr));
        gap:8px !important;
      }

      .student-header-actions .btn{
        width:100%;
        min-width:0;
        white-space:normal;
        line-height:1.25;
      }

      .student-toolbar{
        display:grid;
        grid-template-columns:1fr;
        width:100%;
      }

      .student-toolbar .select,
      .student-toolbar .btn{
        width:100%;
        max-width:none !important;
      }

      .mobile-stack-title{
        flex-direction:column;
        align-items:stretch;
      }

      .mobile-stack-title > .btn{
        width:100%;
      }

      .responsive-card-wrap{
        overflow:visible;
        border:0;
        background:transparent;
      }

      .responsive-card-table{
        display:block;
        min-width:0;
        width:100%;
        border-collapse:separate;
      }

      .responsive-card-table thead{
        display:none;
      }

      .responsive-card-table tbody{
        display:grid;
        gap:10px;
        width:100%;
      }

      .responsive-card-table tr{
        display:block;
        width:100%;
        border:1px solid var(--line);
        border-radius:16px;
        background:#fff;
        padding:6px 11px;
        box-shadow:0 5px 14px rgba(15,23,42,.04);
      }

      .responsive-card-table td{
        display:grid;
        grid-template-columns:minmax(92px,36%) minmax(0,1fr);
        align-items:start;
        gap:10px;
        width:100%;
        padding:9px 0;
        border-bottom:1px solid var(--line);
        font-size:.9rem;
        overflow-wrap:anywhere;
        word-break:break-word;
      }

      .responsive-card-table td::before{
        content:attr(data-label);
        color:var(--muted);
        font-size:.76rem;
        font-weight:900;
        text-transform:uppercase;
        letter-spacing:.035em;
        line-height:1.35;
      }

      .responsive-card-table td:last-child{
        border-bottom:0;
      }

      .responsive-card-table td[data-label="Thao tác"]{
        display:block;
        padding-top:11px;
      }

      .responsive-card-table td[data-label="Thao tác"]::before{
        display:none;
      }

      .responsive-card-table td[data-label="Thao tác"] .btn{
        width:100%;
      }

      .ai-stat-summary{
        display:grid;
        grid-template-columns:repeat(2,minmax(0,1fr)) !important;
        gap:10px;
      }

      .ai-stat-summary > [class^="col-"],
      .ai-stat-summary > [class*=" col-"]{
        grid-column:span 1 !important;
      }

      .ai-stat-summary .card.stat{
        height:100%;
        align-items:flex-start;
      }

      .ai-stat-summary .stat-value{
        font-size:1.3rem;
      }

      .ai-stat-summary .stat-label{
        font-size:.82rem;
      }
    }

    @media (max-width:390px){
      .student-header-actions{
        grid-template-columns:1fr;
      }

      .ai-stat-summary{
        grid-template-columns:1fr !important;
      }

      .responsive-card-table td{
        grid-template-columns:minmax(82px,34%) minmax(0,1fr);
        gap:8px;
      }
    }

    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .col-12,.col-8,.col-6,.col-4,.col-3{grid-column:span 1}
      .split{grid-template-columns:1fr}
      .topbar-inner{align-items:flex-start}
      .top-actions .optional{display:none}
      .user-pill strong,.user-pill span{max-width:160px}
    }

    @media (max-width:560px){
      .app-shell{width:calc(100% - 20px);padding-top:10px}
      .login-card{padding:18px;border-radius:22px}
      .topbar{margin:0 -10px 14px;padding:10px}
      .topbar-inner{gap:8px}
      .brand h1{font-size:1.18rem}
      .brand-mark{width:42px;height:42px;border-radius:14px}
      .card{padding:13px;border-radius:17px}
      .btn{padding:10px 12px}
      .top-actions{gap:6px}
      .user-pill{padding:6px 8px}
      .avatar{width:32px;height:32px}
      .card-title{flex-direction:column;align-items:stretch}
      .card-title > div:last-child:not(:first-child){width:100%}
      .table-wrap{border-radius:14px}
    }
  </style>
</head>

<body>
  <div id="toastRoot"></div>

  <!-- LOGIN -->
  <main id="loginView" class="login-wrap">
    <section class="login-card">
      <div class="brand">
        <div class="brand-mark">CN</div>
        <div>
          <h1 id="loginAppName">Sổ chủ nhiệm số</h1>
          <p>Kết nối GVCN, học sinh và cha mẹ học sinh</p>
        </div>
      </div>

      <div id="loginNotice" class="notice hidden"></div>

      <form id="loginForm" class="form-grid">
        <div class="field">
          <label for="username">Tài khoản</label>
          <input id="username" class="input" autocomplete="username" placeholder="Ví dụ: gvcn01, 8A01, ph_8A01" />
        </div>

        <div class="field">
          <label for="password">Mật khẩu</label>
          <input id="password" class="input" type="password" autocomplete="current-password" placeholder="Nhập mật khẩu" />
        </div>

        <button class="btn btn-primary full" type="submit">Đăng nhập</button>

        <div class="login-actions">
          <button id="forgotBtn" type="button" class="link-btn">Quên mật khẩu?</button>
          <span class="muted">Mật khẩu ban đầu do GVCN cấp.</span>
        </div>
      </form>
    </section>
  </main>

  <!-- APP -->
  <main id="appView" class="hidden">
    <div class="topbar">
      <div class="topbar-inner">
        <div class="user-pill">
          <div id="userAvatar" class="avatar">CN</div>
          <div>
            <strong id="userName">Người dùng</strong>
            <span id="userRole">Vai trò</span>
          </div>
        </div>

        <div class="top-actions">
          <button id="installAppBtn" class="btn btn-soft btn-small" type="button" onclick="openInstallGuide()">📲 <span class="optional">Cài APP</span></button>
          <button id="refreshBtn" class="btn btn-ghost btn-small" type="button">↻ <span class="optional">Làm mới</span></button>
          <button id="changePassBtn" class="btn btn-soft btn-small" type="button">🔐 <span class="optional">Đổi mật khẩu</span></button>
          <button id="logoutBtn" class="btn btn-danger btn-small" type="button">Đăng xuất</button>
        </div>
      </div>
    </div>

    <div class="app-shell">
      <nav id="nav" class="nav"></nav>

      <section id="dashboardPage" class="page"></section>
      <section id="timetablePage" class="page hidden"></section>
      <section id="studentsPage" class="page hidden"></section>
      <section id="profilePage" class="page hidden"></section>
      <section id="messagesPage" class="page hidden"></section>
      <section id="noticesPage" class="page hidden"></section>
      <section id="progressPage" class="page hidden"></section>
      <section id="activitiesPage" class="page hidden"></section>
      <section id="aiSupportPage" class="page hidden"></section>
      <section id="resetPage" class="page hidden"></section>
      <section id="setupPage" class="page hidden"></section>
      <section id="operationsPage" class="page hidden"></section>
      <section id="aiStatsPage" class="page hidden"></section>

      <p class="footer-note">
        Dữ liệu chỉ phục vụ công tác chủ nhiệm cá nhân. Không công khai thông tin riêng tư của học sinh. <br><b id="appVersionText">Phiên bản 16.0.0</b>
      </p>
    </div>
  </main>

  <div id="modalRoot" class="hidden"></div>

<script>
/* =========================================================
   CẤU HÌNH
   Thầy thay URL bên dưới bằng Web App URL của Apps Script.
   Ví dụ:
   const API_URL = 'https://script.google.com/macros/s/AKfycb.../exec';
========================================================= */
const API_URL = 'https://script.google.com/macros/s/AKfycby99lEV9vfHUsQagIUPxUJj7RZfPqZVekvTShfY6S8pfkcCy9sxF0k1-6wtIyuozki8/exec';

const APP_VERSION = '16.0.0';

const LS_TOKEN = 'scn_token_v7';
const LS_USER = 'scn_user_v7';
const LS_LAST_PAGE = 'scn_last_page_v7';
const LS_AI_CHAT_PREFIX = 'scn_ai_chat_v10';
const LS_SAVE_AI_HISTORY = 'scn_save_ai_history_v14';
const LS_DASHBOARD_CACHE = 'scn_dashboard_cache_v13';
const LS_TIMETABLE_CACHE = 'scn_timetable_cache_v14';
const COOKIE_TOKEN = 'scn_token_cookie_v13';
const COOKIE_USER = 'scn_user_cookie_v13';
const DASHBOARD_CACHE_MS = 2 * 60 * 1000;
const TIMETABLE_CACHE_MS = 2 * 60 * 1000;

const initialDashboardCache = readCacheEnvelope(LS_DASHBOARD_CACHE);
const initialTimetableCache = readCacheEnvelope(LS_TIMETABLE_CACHE);
const initialTimetableData = initialTimetableCache ? initialTimetableCache.data : null;

const state = {
  token: getPersistentValue(LS_TOKEN, COOKIE_TOKEN) || '',
  user: readJSON(getPersistentValue(LS_USER, COOKIE_USER), null),
  dashboard: initialDashboardCache ? initialDashboardCache.data : null,

function validApiUrl(){
  return API_URL && API_URL.startsWith('http') && !API_URL.includes('DAN_WEB_APP_URL');
}

/* =========================================================
   API
========================================================= */

async function api(action, data = {}){
  if(!validApiUrl()){
    throw new Error('Chưa cấu hình API_URL trong index.html.');
  }

  const payload = { action, data };

  let res;
  try{
    res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'text/plain;charset=utf-8'
      },
      body: JSON.stringify(payload),
      redirect: 'follow'
    });
  }catch(err){
    throw new Error('Không kết nối được backend. Nếu chạy trên GitHub Pages bị CORS, ta sẽ thêm Cloudflare Worker proxy.');
  }

  let json;
  try{
    json = await res.json();
  }catch(err){
    throw new Error('Backend không trả về JSON hợp lệ. Kiểm tra Web App URL hoặc quyền truy cập Apps Script.');
  }

  if(!json.ok){
    throw new Error(json.error || 'Có lỗi xảy ra.');
  }

  return json.data;
}

async function withLoading(fn, text='Đang xử lí...'){
  const id = showToast(text, 'loading', 30000);
  try{
    const result = await fn();
    hideToast(id);
    return result;
  }catch(err){
    hideToast(id);
    showToast(err.message || String(err), 'error', 5200);
    throw err;
  }
}

async function onLogin(e){
  e.preventDefault();

  const username = $('#username').value.trim();
  const password = $('#password').value;

  if(!username || !password){
    showToast('Vui lòng nhập tài khoản và mật khẩu.', 'warn');
    return;
  }

  await withLoading(async () => {
    const data = await api('login', {
      username,
      password,
      deviceInfo: getDeviceInfo()
    });

    state.token = data.token;
    state.user = data.user;
    normalizeCurrentUserRole();
    state.currentPage = 'dashboard';
    state.dashboard = data.dashboard || null;
    state.dashboardLoadedAt = Date.now();

    persistSession(state.token, state.user);
    localStorage.setItem(LS_LAST_PAGE, 'dashboard');
    writeCacheEnvelope(LS_DASHBOARD_CACHE, state.dashboard);

    showApp();
    activatePageShell('dashboard');
    renderDashboard();

    if(data.mustChangePassword || String(data.user.MustChangePassword).toUpperCase() === 'TRUE'){
      openChangePasswordModal(true);
    }
  }, 'Đang đăng nhập...');
}

async function bootSession(){
  const desiredPage = state.currentPage || 'dashboard';

  if(state.user){
    normalizeCurrentUserRole();
    showApp();
    activatePageShell('dashboard');
    if(state.dashboard) renderDashboard();
    else renderDashboardSkeleton();
  }

  try{
    const data = await api('bootstrap', { token: state.token });
    state.user = data.user;
    normalizeCurrentUserRole();
    state.dashboard = data.dashboard || state.dashboard || {};
    state.dashboardLoadedAt = Date.now();

    persistSession(state.token, state.user);
    writeCacheEnvelope(LS_DASHBOARD_CACHE, state.dashboard);

    showApp();

    if(desiredPage === 'dashboard'){
      activatePageShell('dashboard');
      renderDashboard();
    }else{
      await goPage(desiredPage, false);
    }
  }catch(err){
    const msg = String(err && err.message ? err.message : err);

    if(isExplicitSessionError(msg)){
      clearSession();
      showLogin();
      showToast('Phiên đăng nhập đã hết hạn. Vui lòng đăng nhập lại một lần.', 'warn', 5200);
      return;
    }

    if(state.user){
      state.currentPage = 'dashboard';
      showApp();
      activatePageShell('dashboard');
      if(state.dashboard) renderDashboard();
      else renderDashboardSkeleton('Chưa kết nối được máy chủ. Bấm Làm mới để thử lại.');
      showToast('Mạng hoặc Apps Script đang phản hồi chậm. Hệ thống vẫn giữ đăng nhập trên thiết bị này.', 'warn', 6500);
    }else{
      showLogin();
    }
  }
}

  if(page === 'students' && normalizeRole(state.user.Role) !== 'GVCN') page = 'dashboard';

  state.currentPage = page;

const TIMETABLE_DAYS = [
  { key:'Monday', label:'Thứ Hai', short:'T2', jsDay:1 },
  { key:'Tuesday', label:'Thứ Ba', short:'T3', jsDay:2 },
  { key:'Wednesday', label:'Thứ Tư', short:'T4', jsDay:3 },
  { key:'Thursday', label:'Thứ Năm', short:'T5', jsDay:4 },
  { key:'Friday', label:'Thứ Sáu', short:'T6', jsDay:5 },
  { key:'Saturday', label:'Thứ Bảy', short:'T7', jsDay:6 }
];

function compareWeeklyChangesClient(a,b){
  const dateCompare = String(a.ChangeDate || '').localeCompare(String(b.ChangeDate || ''));
  if(dateCompare !== 0) return dateCompare;
  if(String(a.Priority) !== String(b.Priority)) return String(a.Priority) === 'Quan trọng' ? -1 : 1;
  const order = { 'Sáng':0, 'Chiều':1, 'Cả ngày':2 };
  const sessionCompare = (order[String(a.Session)] ?? 9) - (order[String(b.Session)] ?? 9);
  if(sessionCompare !== 0) return sessionCompare;
  return Number(a.Period || 0) - Number(b.Period || 0);
}

function parseISODateUTC(value){
  const match = String(value || '').match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(!match) return null;
  const date = new Date(Date.UTC(Number(match[1]), Number(match[2]) - 1, Number(match[3])));
  if(date.getUTCFullYear() !== Number(match[1]) || date.getUTCMonth() !== Number(match[2]) - 1 || date.getUTCDate() !== Number(match[3])) return null;
  return date;
}

function dateToISOUTC(date){
  return `${date.getUTCFullYear()}-${String(date.getUTCMonth() + 1).padStart(2,'0')}-${String(date.getUTCDate()).padStart(2,'0')}`;
}

function addDaysISO(value, days){
  const date = parseISODateUTC(value);
  if(!date) return '';
  date.setUTCDate(date.getUTCDate() + Number(days || 0));
  return dateToISOUTC(date);
}

function formatISODateVi(value, includeWeekday=false){
  const date = parseISODateUTC(value);
  if(!date) return String(value || '');
  const weekdays = ['Chủ nhật','Thứ Hai','Thứ Ba','Thứ Tư','Thứ Năm','Thứ Sáu','Thứ Bảy'];
  const dateText = `${String(date.getUTCDate()).padStart(2,'0')}/${String(date.getUTCMonth() + 1).padStart(2,'0')}/${date.getUTCFullYear()}`;
  return includeWeekday ? `${weekdays[date.getUTCDay()]}, ${dateText}` : dateText;
}

function getTimetableWeekContext(offset=state.timetableWeekOffset || 0){
  const clock = getVietnamClock();
  const today = parseISODateUTC(clock.isoDate) || new Date();
  const jsDay = today.getUTCDay();
  // Chủ nhật được xem như thời điểm chuẩn bị cho tuần học kế tiếp.
  const mondayShift = jsDay === 0 ? 1 : 1 - jsDay;
  today.setUTCDate(today.getUTCDate() + mondayShift + Number(offset || 0) * 7);

  const dates = {};
  TIMETABLE_DAYS.forEach((day,index) => {
    const current = new Date(today.getTime());
    current.setUTCDate(current.getUTCDate() + index);
    dates[day.key] = dateToISOUTC(current);
  });

  const start = dates.Monday;
  const end = dates.Saturday;
  const startDate = parseISODateUTC(start);
  const endDate = parseISODateUTC(end);
  const label = `${String(startDate.getUTCDate()).padStart(2,'0')}/${String(startDate.getUTCMonth() + 1).padStart(2,'0')} – ${String(endDate.getUTCDate()).padStart(2,'0')}/${String(endDate.getUTCMonth() + 1).padStart(2,'0')}/${endDate.getUTCFullYear()}`;
  return { offset:Number(offset || 0), start, end, dates, label };
}

function getChangesForWeek(context){
  return [...(state.timetableChanges || [])]
    .filter(change => String(change.ChangeDate || '') >= context.start && String(change.ChangeDate || '') <= context.end)
    .sort(compareWeeklyChangesClient);
}

function getChangesForDate(date){
  return [...(state.timetableChanges || [])]
    .filter(change => String(change.ChangeDate || '') === String(date || ''))
    .sort(compareWeeklyChangesClient);
}

function getExactSlotChanges(date, session, period){
  return getChangesForDate(date).filter(change =>
    String(change.Session || '') === String(session || '') &&
    Number(change.Period || 0) === Number(period || 0) &&
    Number(change.Period || 0) > 0
  );
}

function renderSlotChangeBadges(changes){
  if(!changes.length) return '';
  const visible = changes.slice(0,2).map(change => `
    <span class="slot-change-badge ${String(change.Priority) === 'Quan trọng' ? 'important' : ''}">
      ${escapeHTML(change.ChangeType || 'Thay đổi')}: ${escapeHTML(change.NewContent || '')}
    </span>
  `).join('');
  const more = changes.length > 2 ? `<span class="slot-change-badge">+${changes.length - 2} thay đổi khác</span>` : '';
  return visible + more;
}

async function loadTimetable(force=false){
  const isFresh = state.timetable.length && (Date.now() - state.timetableLoadedAt < TIMETABLE_CACHE_MS);

  if(state.timetable.length) renderTimetable();
  else renderTimetableSkeleton();

  if(!force && isFresh) return;

  const load = async () => {
    const data = await api('getTimetable', { token: state.token });
    state.timetable = (data.rows || []).sort(compareTimetableRowsClient);
    state.timetableChanges = (data.changes || []).sort(compareWeeklyChangesClient);
    state.timetableNote = data.note || '';
    state.timetableLoadedAt = Date.now();
    writeCacheEnvelope(LS_TIMETABLE_CACHE, { rows: state.timetable, changes: state.timetableChanges, note: state.timetableNote });
    renderTimetable();
  };

  if(state.timetable.length){
    try{
      await load();
    }catch(err){
      console.error('Không làm mới được thời khóa biểu:', err);
      showToast('Đang hiển thị thời khóa biểu đã lưu gần nhất.', 'warn', 4200);
    }
  }else{
    await withLoading(load, 'Đang tải thời khóa biểu...');
  }
}

function compareTimetableRowsClient(a,b){
  const order = { 'Sáng':0, 'Chiều':1 };
  const sa = order[String(a.Session || '')] ?? 9;
  const sb = order[String(b.Session || '')] ?? 9;
  if(sa !== sb) return sa - sb;
  return Number(a.Period || 0) - Number(b.Period || 0);
}

function getVietnamClock(){
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone:'Asia/Ho_Chi_Minh',
    weekday:'short',
    year:'numeric',
    month:'2-digit',
    day:'2-digit',
    hour:'2-digit',
    minute:'2-digit',
    second:'2-digit',
    hourCycle:'h23',
    hour12:false
  }).formatToParts(new Date());

  const map = {};
  parts.forEach(p => { if(p.type !== 'literal') map[p.type] = p.value; });

  const dayMap = { Mon:1, Tue:2, Wed:3, Thu:4, Fri:5, Sat:6, Sun:0 };
  return {
    jsDay: dayMap[map.weekday] ?? new Date().getDay(),
    minutes: Number(map.hour || 0) * 60 + Number(map.minute || 0),
    isoDate: `${map.year}-${map.month}-${map.day}`,
    displayDate: `${map.day}/${map.month}/${map.year}`,
    displayTime: `${map.hour}:${map.minute}`
  };
}

function normalizeClockDisplay(value){
  const raw = String(value ?? '').trim();
  if(!raw) return '';

  const plain = raw.match(/^(\d{1,2}):(\d{2})(?::\d{2})?$/);
  if(plain){
    const h = Number(plain[1]);
    const m = Number(plain[2]);
    if(h >= 0 && h <= 23 && m >= 0 && m <= 59){
      return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    }
  }

  // Google Sheets có thể trả ô giờ dưới dạng ngày 30/12/1899.
  // Định dạng lại theo múi giờ Việt Nam để chỉ lấy HH:mm.
  const date = new Date(raw);
  if(!Number.isNaN(date.getTime())){
    try{
      const parts = new Intl.DateTimeFormat('vi-VN',{
        timeZone:'Asia/Ho_Chi_Minh',
        hour:'2-digit',
        minute:'2-digit',
        hourCycle:'h23',
        hour12:false
      }).formatToParts(date);
      const map = {};
      parts.forEach(p => { if(p.type !== 'literal') map[p.type] = p.value; });
      if(map.hour !== undefined && map.minute !== undefined){
        return `${String(map.hour).padStart(2,'0')}:${String(map.minute).padStart(2,'0')}`;
      }
    }catch(err){
      console.warn('Không định dạng được giờ TKB:', raw, err);
    }
  }

  return raw;
}

function timeToMinutes(value){
  const normalized = normalizeClockDisplay(value);
  const m = normalized.match(/^(\d{2}):(\d{2})$/);
  if(!m) return null;
  return Number(m[1]) * 60 + Number(m[2]);
}

function formatTimetableTimeRange(row){
  const start = normalizeClockDisplay(row && row.StartTime);
  const end = normalizeClockDisplay(row && row.EndTime);
  if(start && end) return `${start}–${end}`;
  if(start) return `Từ ${start}`;
  if(end) return `Đến ${end}`;
  return 'Chưa đặt giờ';
}

function getCurrentTimetableStatus(rows, changes=[]){
  const clock = getVietnamClock();
  const day = TIMETABLE_DAYS.find(d => d.jsDay === clock.jsDay);

  if(!day){
    return {
      type:'off',
      icon:'🌤️',
      title:'Hôm nay là Chủ nhật',
      note:`${clock.displayDate} · Không có tiết học trong thời khóa biểu.`,
      dayKey:'',
      activeKey:''
    };
  }

  const sorted = [...rows].sort(compareTimetableRowsClient);
  const usable = sorted.filter(r => timeToMinutes(r.StartTime) !== null && timeToMinutes(r.EndTime) !== null);
  const now = clock.minutes;

  for(const row of usable){
    const start = timeToMinutes(row.StartTime);
    const end = timeToMinutes(row.EndTime);
    if(now >= start && now < end){
      const slotChanges = [...changes]
        .filter(change => String(change.ChangeDate || '') === clock.isoDate && String(change.Session || '') === String(row.Session || '') && Number(change.Period || 0) === Number(row.Period || 0))
        .sort(compareWeeklyChangesClient);
      const mainChange = slotChanges[0];
      const subject = mainChange && String(mainChange.ChangeType) === 'Đổi môn'
        ? String(mainChange.NewContent || '').trim()
        : String(row[day.key] || '').trim();
      return {
        type:'lesson',
        icon:'📚',
        title:`Đang học ${String(row.Session || '').toLowerCase()} tiết ${row.Period}${subject ? ': ' + subject : ''}`,
        note:`${day.label}, ${clock.displayDate} · ${row.StartTime}–${row.EndTime}${mainChange ? ' · ' + mainChange.ChangeType + ': ' + mainChange.NewContent : ''}`,
        dayKey:day.key,
        activeKey:`${row.Session}_${row.Period}`
      };
    }
  }

  const morning = usable.filter(r => r.Session === 'Sáng');
  const afternoon = usable.filter(r => r.Session === 'Chiều');
  const morningP2 = morning.find(r => Number(r.Period) === 2);
  const morningP3 = morning.find(r => Number(r.Period) === 3);
  const afternoonP3 = afternoon.find(r => Number(r.Period) === 3);
  const afternoonP4 = afternoon.find(r => Number(r.Period) === 4);

  if(morningP2 && morningP3 && now >= timeToMinutes(morningP2.EndTime) && now < timeToMinutes(morningP3.StartTime)){
    return {
      type:'break',
      icon:'☕',
      title:'Đang ra chơi sau tiết 2 buổi sáng',
      note:`${day.label}, ${clock.displayDate} · Tiết 3 bắt đầu lúc ${morningP3.StartTime}`,
      dayKey:day.key,
      activeKey:'Sáng_break'
    };
  }

  if(afternoonP3 && afternoonP4 && now >= timeToMinutes(afternoonP3.EndTime) && now < timeToMinutes(afternoonP4.StartTime)){
    return {
      type:'break',
      icon:'☕',
      title:'Đang ra chơi sau tiết 3 buổi chiều',
      note:`${day.label}, ${clock.displayDate} · Tiết 4 bắt đầu lúc ${afternoonP4.StartTime}`,
      dayKey:day.key,
      activeKey:'Chiều_break'
    };
  }

  const firstMorning = morning[0];
  const lastMorning = morning[morning.length - 1];
  const firstAfternoon = afternoon[0];
  const lastAfternoon = afternoon[afternoon.length - 1];

  if(firstMorning && now < timeToMinutes(firstMorning.StartTime)){
    return { type:'waiting', icon:'⏰', title:'Chưa vào tiết học buổi sáng', note:`Tiết 1 bắt đầu lúc ${firstMorning.StartTime}`, dayKey:day.key, activeKey:'' };
  }

  if(lastMorning && firstAfternoon && now >= timeToMinutes(lastMorning.EndTime) && now < timeToMinutes(firstAfternoon.StartTime)){
    return { type:'lunch', icon:'🍱', title:'Đang nghỉ trưa', note:`Buổi chiều bắt đầu lúc ${firstAfternoon.StartTime}`, dayKey:day.key, activeKey:'' };
  }

  if(lastAfternoon && now >= timeToMinutes(lastAfternoon.EndTime)){
    return { type:'done', icon:'✅', title:'Đã kết thúc các tiết học hôm nay', note:`${day.label}, ${clock.displayDate}`, dayKey:day.key, activeKey:'' };
  }

  return { type:'transition', icon:'🔔', title:'Đang chuyển tiết hoặc ngoài khung giờ đã thiết lập', note:`${day.label}, ${clock.displayDate} · ${clock.displayTime}`, dayKey:day.key, activeKey:'' };
}

function normalizeSubjectName(value){
  return String(value || '')
    .toLowerCase()
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .replace(/đ/g,'d')
    .trim();
}

function getSubjectChipClass(subject){
  const s = normalizeSubjectName(subject);
  if(!s) return '';
  if(/ngu van|lich su|dia li/.test(s)) return 'subject-orange';
  if(/ngoai ngu|tieng anh/.test(s)) return 'subject-purple';
  if(/am nhac|chao co|sinh hoat|shl|hdtn|hoat dong trai nghiem/.test(s)) return 'subject-green';
  if(/gdtc|the duc|gddp|mi thuat|my thuat/.test(s)) return 'subject-gray';
  if(/gdcd|giao duc cong dan/.test(s)) return 'subject-pink';
  if(/tin|cong nghe|khtn|toan/.test(s)) return 'subject-blue';
  return 'subject-teal';
}

function renderSubjectChip(subject, isCurrent){
  const value = String(subject || '').trim();
  if(!value) return '';
  return `<span class="subject-chip ${getSubjectChipClass(value)}${isCurrent ? ' current-subject' : ''}">${escapeHTML(value)}</span>`;
}

function buildWeeklyTimetableRows(rows, status, weekContext){
  const sessions = ['Sáng','Chiều'];
  let html = '';

  sessions.forEach(session => {
    const group = rows.filter(r => String(r.Session) === session);
    group.forEach((r,index) => {
      const breakAfter = (r.Session === 'Sáng' && Number(r.Period) === 2) ||
                         (r.Session === 'Chiều' && Number(r.Period) === 3);
      html += `<tr class="${breakAfter ? 'break-after-row' : ''}">`;
      if(index === 0){
        html += `<td class="session-cell" rowspan="${group.length}"><span>${escapeHTML(session)}</span></td>`;
      }
      html += `<td class="period-column">${escapeHTML(r.Period || '')}</td>`;
      html += `<td class="time-column">${escapeHTML(formatTimetableTimeRange(r))}</td>`;
      html += TIMETABLE_DAYS.map(d => {
        const date = weekContext.dates[d.key];
        const slotChanges = getExactSlotChanges(date, r.Session, r.Period);
        const isCurrent = weekContext.offset === 0 && status.type === 'lesson' &&
          status.dayKey === d.key &&
          status.activeKey === `${r.Session}_${r.Period}`;
        return `<td class="subject-cell ${isCurrent ? 'current-cell' : ''} ${slotChanges.length ? 'has-change' : ''}">${renderSubjectChip(r[d.key], isCurrent)}${renderSlotChangeBadges(slotChanges)}</td>`;
      }).join('');
      html += `</tr>`;
    });
  });

  return html;
}

async function downloadTimetableImage(){
  if(typeof html2canvas !== 'function'){
    showToast('Chưa tải được thư viện tạo ảnh. Vui lòng thử lại sau.', 'error', 6000);
    return;
  }

  const source = document.getElementById('timetableCapture');
  if(!source){
    showToast('Không tìm thấy thời khóa biểu để tải ảnh.', 'warn');
    return;
  }

  const clone = source.cloneNode(true);
  clone.id = 'timetableExportClone';
  clone.classList.add('export-clone');
  const mobile = clone.querySelector('.timetable-mobile');
  if(mobile) mobile.remove();
  clone.querySelectorAll('.weekly-change-actions,.weekly-change-head .btn,.timetable-week-nav').forEach(el => el.remove());
  document.body.appendChild(clone);

  try{
    showToast('Đang tạo ảnh thời khóa biểu...', 'loading', 30000);
    const canvas = await html2canvas(clone, {
      scale:2,
      backgroundColor:'#ffffff',
      useCORS:true,
      logging:false,
      windowWidth:1400
    });
    const link = document.createElement('a');
    const className = String((state.dashboard && state.dashboard.app && state.dashboard.app.className) || 'lop').replace(/[^a-zA-Z0-9_-]+/g,'_');
    link.download = `thoi-khoa-bieu-${className}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('Đã tạo ảnh thời khóa biểu.', 'success');
  }catch(err){
    console.error('Lỗi tạo ảnh TKB:', err);
    showToast('Không tạo được ảnh thời khóa biểu.', 'error', 6000);
  }finally{
    clone.remove();
  }
}

  return parts.join(' · ') || 'Cả ngày';
}

function showTodayTimetable(){
  const clock = getVietnamClock();
  const day = TIMETABLE_DAYS.find(d => d.jsDay === clock.jsDay);
  state.timetableWeekOffset = 0;
  state.selectedTimetableDay = day ? day.key : 'Monday';
  renderTimetable();
}

function changeTimetableWeek(delta){
  state.timetableWeekOffset = Math.max(-12, Math.min(24, Number(state.timetableWeekOffset || 0) + Number(delta || 0)));
  renderTimetable();
}

function showCurrentTimetableWeek(){
  state.timetableWeekOffset = 0;
  renderTimetable();
}

function changeTimetableDay(delta){
  let index = TIMETABLE_DAYS.findIndex(d => d.key === state.selectedTimetableDay);
  if(index < 0) index = 0;
  index = (index + delta + TIMETABLE_DAYS.length) % TIMETABLE_DAYS.length;
  state.selectedTimetableDay = TIMETABLE_DAYS[index].key;
  renderSelectedTimetableDay();
}

function renderSelectedTimetableDay(){
  const root = $('#timetableSwipe');
  if(!root) return;

  const day = TIMETABLE_DAYS.find(d => d.key === state.selectedTimetableDay) || TIMETABLE_DAYS[0];
  const clock = getVietnamClock();
  const weekContext = getTimetableWeekContext();
  const selectedDate = weekContext.dates[day.key];
  const today = selectedDate === clock.isoDate;
  const status = getCurrentTimetableStatus(state.timetable || [], state.timetableChanges || []);

  const title = $('#timetableDayTitle');
  const subtitle = $('#timetableDaySubtitle');
  if(title) title.textContent = day.label + (today ? ' · Hôm nay' : '');
  if(subtitle) subtitle.textContent = formatISODateVi(selectedDate);

  const generalChanges = getChangesForDate(selectedDate).filter(change => Number(change.Period || 0) === 0);
  const generalHtml = generalChanges.length ? `
    <div class="mobile-day-changes">
      ${generalChanges.map(change => `
        <div class="notice ${String(change.Priority) === 'Quan trọng' ? 'warn' : ''}">
          <b>${escapeHTML(change.ChangeType || 'Thay đổi')}:</b> ${escapeHTML(change.NewContent || '')}
          ${change.Note ? `<div class="muted" style="margin-top:4px">${escapeHTML(change.Note)}</div>` : ''}
        </div>
      `).join('')}
    </div>
  ` : '';

  const html = [...(state.timetable || [])].sort(compareTimetableRowsClient).map(r => {
    const key = `${r.Session}_${r.Period}`;
    const active = today && status.type === 'lesson' && status.activeKey === key;
    const slotChanges = getExactSlotChanges(selectedDate, r.Session, r.Period);
    const breakAfter = (r.Session === 'Sáng' && Number(r.Period) === 2) ||
                       (r.Session === 'Chiều' && Number(r.Period) === 3);

    return `
      <div class="timetable-period ${active ? 'active' : ''} ${breakAfter ? 'break-marker' : ''} ${slotChanges.length ? 'has-change' : ''}">
        <div class="period-label">${escapeHTML(r.Session)} ${escapeHTML(r.Period)}</div>
        <div class="period-subject">${renderSubjectChip(r[day.key], active) || '<span class="muted">Chưa xếp môn</span>'}${renderSlotChangeBadges(slotChanges)}</div>
        <div class="period-time">${escapeHTML(formatTimetableTimeRange(r))}</div>
      </div>
    `;
  }).join('');

  root.innerHTML = `${generalHtml}<div class="timetable-period-list">${html}</div>`;
}

function bindTimetableSwipe(){
  const el = $('#timetableSwipe');
  if(!el) return;

  let startX = 0;
  let startY = 0;

  el.ontouchstart = e => {
    const t = e.changedTouches[0];
    startX = t.clientX;
    startY = t.clientY;
  };

  el.ontouchend = e => {
    const t = e.changedTouches[0];
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    if(Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy)){
      changeTimetableDay(dx < 0 ? 1 : -1);
    }
  };
}

function collectTimetableTimes(){
  $$('.tkb-start-input').forEach(input => {
    const index = Number(input.dataset.index);
    if(state.timetableDraft[index]) state.timetableDraft[index].StartTime = input.value;
  });
  $$('.tkb-end-input').forEach(input => {
    const index = Number(input.dataset.index);
    if(state.timetableDraft[index]) state.timetableDraft[index].EndTime = input.value;
  });
}


function validateTimetableTimes(rows){
  const sorted = [...(rows || [])].sort(compareTimetableRowsClient);
  const sessions = ['Sáng','Chiều'];

  for(const session of sessions){
    const sessionRows = sorted.filter(r => String(r.Session) === session);

    for(let i = 0; i < sessionRows.length; i++){
      const row = sessionRows[i];
      const start = timeToMinutes(row.StartTime);
      const end = timeToMinutes(row.EndTime);

      if(start === null || end === null){
        return `${session} tiết ${row.Period}: cần nhập đủ giờ bắt đầu và giờ kết thúc.`;
      }

      if(end <= start){
        return `${session} tiết ${row.Period}: giờ kết thúc phải sau giờ bắt đầu.`;
      }

      if(i > 0){
        const prev = sessionRows[i - 1];
        const prevEnd = timeToMinutes(prev.EndTime);
        if(prevEnd !== null && start < prevEnd){
          return `${session} tiết ${row.Period}: thời gian đang chồng lên tiết ${prev.Period}.`;
        }
      }
    }
  }

  return '';
}

async function saveTimetableFromEditor(){
  collectTimetableEditorDay();
  collectTimetableTimes();

  const validationError = validateTimetableTimes(state.timetableDraft);
  if(validationError){
    showToast(validationError, 'warn', 6500);
    return;
  }

  const btn = $('#saveTimetableBtn');
  if(btn) btn.disabled = true;

  try{
    await withLoading(async () => {
      const data = await api('saveTimetable', {
        token: state.token,
        rows: state.timetableDraft,
        note: $('#timetableNoteInput') ? $('#timetableNoteInput').value.trim() : state.timetableNote
      });

      state.timetable = (data.rows || state.timetableDraft).sort(compareTimetableRowsClient);
      state.timetableNote = data.note || ($('#timetableNoteInput') ? $('#timetableNoteInput').value.trim() : state.timetableNote);
      state.timetableLoadedAt = Date.now();
      writeCacheEnvelope(LS_TIMETABLE_CACHE, { rows: state.timetable, changes: state.timetableChanges, note: state.timetableNote });
      closeModal();
      renderTimetable();
      showToast(data.message || 'Đã lưu thời khóa biểu.', 'success');
    }, 'Đang lưu thời khóa biểu...');
  }finally{
    if(btn) btn.disabled = false;
  }
}

async function handleStudentImportFile(e){
  const file = e.target.files && e.target.files[0];
  if(!file) return;
  const name = file.name.toLowerCase();

  try{
    if(name.endsWith('.xlsx') || name.endsWith('.xls')){
      if(typeof XLSX === 'undefined'){
        showToast('Chưa tải được thư viện đọc Excel. Thầy có thể lưu file thành CSV rồi nhập lại.', 'error', 6500);
        return;
      }
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: '' });
      $('#studentImportRaw').value = rows.map(r => r.map(cell => String(cell || '').trim()).join('\\t')).join('\\n');
    }else{
      const text = await file.text();
      $('#studentImportRaw').value = text;
    }
    showToast('Đã đọc file. Thầy kiểm tra nhanh dữ liệu rồi bấm nhập.', 'success');
  }catch(err){
    showToast('Không đọc được file: ' + (err.message || err), 'error', 6500);
  }
}

async function submitStudentImportFromStudentsTab(e){
  e.preventDefault();
  const raw = $('#studentImportRaw').value.trim();
  if(!raw){
    showToast('Vui lòng chọn file hoặc dán dữ liệu học sinh.', 'warn');
    return;
  }

  await withLoading(async () => {
    const data = await api('bulkImportStudents', {
      token: state.token,
      raw,
      defaultClassName: $('#importDefaultClass').value.trim(),
      defaultPassword: $('#importDefaultPassword').value.trim(),
      createAccounts: 'TRUE'
    });
    state.lastImportedAccounts = data.accounts || [];
    renderStudentImportResult(data);
    await loadStudents();
    showToast(data.message || 'Đã nhập danh sách.', 'success', 5600);
  }, 'Đang nhập học sinh từ file...');
}

function renderStudentImportResult(data){
  const accounts = data.accounts || [];
  const errors = data.errors || [];
  $('#studentImportResult').innerHTML = `
    <div class="notice ${errors.length ? 'warn' : ''}">
      ${escapeHTML(data.message || '')}
      ${accounts.length ? '<br><b>Lưu ý:</b> Nên sao chép danh sách tài khoản mới tạo ngay vì mật khẩu sẽ được mã hóa, sau này không xem lại được.' : ''}
    </div>
    ${accounts.length ? accountTable(accounts, true) : ''}
    ${errors.length ? `
      <h3 style="margin:14px 0 8px">Dòng lỗi/bỏ qua</h3>
      <div class="table-wrap"><table><thead><tr><th>Dòng</th><th>Nội dung</th><th>Lỗi</th></tr></thead><tbody>
        ${errors.map(e => `<tr><td>${escapeHTML(e.line)}</td><td>${escapeHTML(e.content)}</td><td>${escapeHTML(e.error)}</td></tr>`).join('')}
      </tbody></table></div>

}

function downloadStudentTemplateCSV(){
  const text = [
    'MaHocSinh,Lop,HoTenHocSinh,GioiTinh,NgaySinh,SoDienThoaiHocSinh,HoTenCMHS,SoDienThoaiCMHS,DiaChi',
    'HS001,8A,Nguyễn Văn A,Nam,2012-01-01,0911111111,Phụ huynh A,0922222222,',
    'HS002,8A,Trần Thị B,Nữ,2012-02-02,,Phụ huynh B,0933333333,'
  ].join('\\n');
  const blob = new Blob(['\\ufeff' + text], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'mau_nhap_hoc_sinh_so_chu_nhiem.csv';
  document.body.appendChild(a);
  a.click();
  URL.revokeObjectURL(a.href);
  a.remove();
}

}

      $('#teacherAIChatBtn').disabled = true;

      const data = await api('aiChatContinue', {
        token: state.token,
        mode: 'GVCN',
        studentID,
        caseID: $('#teacherAIChatWrap').dataset.caseId || '',

        previous

function clearChatHistory(id){
  const el = document.getElementById(id);
  if(el) el.innerHTML = '';
}

function appendChatMessage(id, who, text){
  const el = document.getElementById(id);
  if(!el) return;
  const isAI = who === 'ai';
  const div = document.createElement('div');
  div.className = 'item';
  div.style.background = isAI ? '#f8fafc' : '#eff6ff';
  div.innerHTML = `
    <div class="item-row">
      <p class="item-title">${isAI ? 'AI' : 'Bạn'}</p>
      <span class="badge ${isAI ? 'badge-purple' : 'badge-blue'}">${isAI ? 'Phản hồi' : 'Câu hỏi'}</span>
    </div>
    <div class="item-content">${escapeHTML(text || '')}</div>
  `;
  el.appendChild(div);
  div.scrollIntoView({behavior:'smooth', block:'end'});
}

function collectChatText(id){
  const el = document.getElementById(id);
  if(!el) return '';
  return Array.from(el.querySelectorAll('.item')).map(item => item.innerText.trim()).join('\n\n').slice(-6500);
}


function getAIChatStorageKey(suffix){
  const userID = state.user && state.user.UserID ? state.user.UserID : 'guest';
  return `${LS_AI_CHAT_PREFIX}_${userID}_${suffix}`;
}

function getTeacherChatKey(studentID){
  return getAIChatStorageKey(`GVCN_${studentID || 'none'}`);
}

function getPersonalChatKey(){
  const role = normalizeRole(state.user?.Role || '');
  const sid = state.user?.StudentID || 'none';
  return getAIChatStorageKey(`${role}_${sid}`);
}

function readChatMessages(id){
  const el = document.getElementById(id);
  if(!el) return [];
  return Array.from(el.querySelectorAll('.item')).map(item => {
    const title = item.querySelector('.item-title')?.textContent || '';
    const content = item.querySelector('.item-content')?.textContent || '';
    return {
      who: title.trim() === 'AI' ? 'ai' : 'user',
      text: content,
      time: new Date().toISOString()
    };
  }).filter(m => m.text);
}

function getAIHistoryPreference(){
  const saved = localStorage.getItem(LS_SAVE_AI_HISTORY);
  return saved === null ? true : saved === 'TRUE';
}

function setAIHistoryPreference(enabled){
  localStorage.setItem(LS_SAVE_AI_HISTORY, enabled ? 'TRUE' : 'FALSE');
}

function saveAIChatHistory(key, messages){
  if(normalizeRole(state.user?.Role) !== 'GVCN' && !getAIHistoryPreference()){
    localStorage.removeItem(key);
    return;
  }
  try{
    localStorage.setItem(key, JSON.stringify((messages || []).slice(-30)));
  }catch(e){}
}

function loadAIChatHistory(key){
  if(normalizeRole(state.user?.Role) !== 'GVCN' && !getAIHistoryPreference()) return [];
  try{
    const arr = JSON.parse(localStorage.getItem(key) || '[]');
    return Array.isArray(arr) ? arr : [];
  }catch(e){
    return [];
  }
}

function restoreChatHistory(targetId, key){
  const messages = loadAIChatHistory(key);
  if(!messages.length) return false;
  clearChatHistory(targetId);
  messages.forEach(m => appendChatMessage(targetId, m.who, m.text));
  return true;
}

function restoreTeacherAIChat(studentID){
  const key = getTeacherChatKey(studentID);
  if(restoreChatHistory('teacherAIChatHistory', key)){
    const wrap = $('#teacherAIChatWrap');
    if(wrap){
      wrap.classList.remove('hidden');
      wrap.dataset.caseId = 'CHAT_TIEP';
    }
  }
}

function restorePersonalAIChat(){
  const key = getPersonalChatKey();
  if(restoreChatHistory('personalAIChatHistory', key)){
    const wrap = $('#personalAIChatWrap');
    if(wrap) wrap.classList.remove('hidden');
  }
}

function clearSavedTeacherAIChat(studentID){
  localStorage.removeItem(getTeacherChatKey(studentID));
  clearChatHistory('teacherAIChatHistory');
  showToast('Đã xóa lịch sử chat AI trên thiết bị này.', 'success');
}

function clearSavedPersonalAIChat(){
  localStorage.removeItem(getPersonalChatKey());
  clearChatHistory('personalAIChatHistory');
  showToast('Đã xóa lịch sử chat AI trên thiết bị này.', 'success');
}

function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(() => showToast('Đã sao chép.', 'success'));
    return;
  }
  const ta = document.createElement('textarea');
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  ta.remove();
  showToast('Đã sao chép.', 'success');
}

  const html = `

        </div>

        <form id="sendMsgForm" class="form-grid">
          ${isTeacher ? `
            <div class="field">
              <label>Học sinh liên quan</label>
              <select id="msgStudentID" class="select">
                <option value="">-- Chọn học sinh --</option>

            </div>
            <div class="field">
              <label>Người nhận</label>
              <select id="msgTargetRole" class="select">
                <option value="HS">Học sinh</option>
                <option value="PHHS">PHHS</option>
              </select>
            </div>
          ` : ''}

          <div class="split">
            <div class="field">
              <label>Chủ đề</label>
              <input id="msgSubject" class="input" placeholder="Ví dụ: Trao đổi tình hình học tập" />
            </div>
            <div class="field">
              <label>Mức độ</label>
              <select id="msgPriority" class="select">
                <option>Bình thường</option>
                <option>Quan trọng</option>
                <option>Khẩn</option>
              </select>
            </div>
          </div>

          <div class="field">
            <label>Nội dung</label>
            <textarea id="msgContent" class="textarea" placeholder="Nhập nội dung cần trao đổi..."></textarea>

    </div>
  `;
  openModal(html);

  $('#sendMsgForm').addEventListener('submit', async e => {
    e.preventDefault();

    const content = $('#msgContent').value.trim();
    if(!content){
      showToast('Vui lòng nhập nội dung tin nhắn.', 'warn');
      return;
    }

    const payload = {
      token: state.token,
      subject: $('#msgSubject').value.trim(),
      content,
      priority: $('#msgPriority').value
    };

    if(isTeacher){
      payload.studentID = $('#msgStudentID').value;
      payload.targetRole = $('#msgTargetRole').value;
      if(!payload.studentID){
        showToast('Vui lòng chọn học sinh liên quan.', 'warn');
        return;
      }
    }

    await withLoading(async () => {
      await api('sendMessage', payload);
      closeModal();
      showToast('Đã gửi tin nhắn.', 'success');
      if(state.currentPage === 'messages') await loadMessages();
      else await loadDashboard();
    }, 'Đang gửi tin nhắn...');
  });
}
