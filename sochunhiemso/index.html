<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#2563eb" />
  <meta name="description" content="Sổ chủ nhiệm số kết nối GVCN, học sinh và cha mẹ học sinh." />
  <title>Sổ chủ nhiệm số</title>

  <!-- Bước PWA sẽ bổ sung manifest.json, icon và service-worker.js -->
  <link rel="manifest" href="manifest.json" />

  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#dbe4f0;
      --primary:#2563eb;
      --primary-dark:#1d4ed8;
      --primary-soft:#dbeafe;
      --success:#16a34a;
      --warning:#f59e0b;
      --danger:#dc2626;
      --radius:18px;
      --shadow:0 14px 32px rgba(15,23,42,.08);
      --shadow-soft:0 8px 20px rgba(15,23,42,.06);
      --focus:0 0 0 4px rgba(37,99,235,.16);
      --max:1160px;
      --font:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      min-height:100vh;
      font-family:var(--font);
      background:
        radial-gradient(circle at top left,rgba(37,99,235,.13),transparent 34rem),
        linear-gradient(180deg,#f8fbff 0%,var(--bg) 70%);
      color:var(--text);
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    .hidden{display:none!important}
    .muted{color:var(--muted)}
    .danger-text{color:var(--danger)}
    .success-text{color:var(--success)}
    .warning-text{color:#b45309}

    .app-shell{
      width:min(var(--max),calc(100% - 28px));
      margin:0 auto;
      padding:18px 0 28px;
    }

    .login-wrap{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:18px;
    }

    .login-card{
      width:min(470px,100%);
      background:rgba(255,255,255,.94);
      backdrop-filter:blur(18px);
      border:1px solid rgba(219,228,240,.9);
      border-radius:26px;
      box-shadow:var(--shadow);
      padding:24px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
    }

    .brand-mark{
      width:48px;
      height:48px;
      border-radius:16px;
      background:linear-gradient(135deg,#2563eb,#38bdf8);
      color:#fff;
      display:grid;
      place-items:center;
      font-weight:900;
      box-shadow:0 12px 24px rgba(37,99,235,.25);
      flex:0 0 auto;
    }

    .brand h1{
      font-size:1.35rem;
      line-height:1.2;
      margin:0;
    }

    .brand p{
      margin:4px 0 0;
      font-size:.92rem;
      color:var(--muted);
    }

    .form-grid{display:grid;gap:12px}
    .field label{
      display:block;
      font-size:.86rem;
      font-weight:750;
      margin-bottom:6px;
      color:#334155;
    }

    .input,.select,.textarea{
      width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px 13px;
      background:#fff;
      color:var(--text);
      outline:none;
      transition:.16s ease;
    }

    .textarea{
      min-height:112px;
      resize:vertical;
      line-height:1.55;
    }

    .input:focus,.select:focus,.textarea:focus{
      border-color:var(--primary);
      box-shadow:var(--focus);
    }

    .btn{
      border:0;
      border-radius:14px;
      padding:11px 14px;
      background:#e2e8f0;
      color:#0f172a;
      font-weight:800;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition:.16s ease;
      min-height:44px;
      text-decoration:none;
    }

    .btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-soft)}
    .btn:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}
    .btn-primary{background:var(--primary);color:#fff}
    .btn-primary:hover{background:var(--primary-dark)}
    .btn-soft{background:var(--primary-soft);color:#1e40af}
    .btn-danger{background:#fee2e2;color:#991b1b}
    .btn-success{background:#dcfce7;color:#166534}
    .btn-ghost{background:transparent;color:#334155;border:1px solid var(--line)}
    .btn-small{min-height:36px;padding:8px 11px;border-radius:12px;font-size:.9rem}
    .full{width:100%}

    .login-actions{
      display:flex;
      gap:10px;
      align-items:center;
      margin-top:14px;
      flex-wrap:wrap;
    }

    .link-btn{
      background:none;
      border:0;
      color:var(--primary);
      padding:0;
      font-weight:800;
      text-decoration:none;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:20;
      background:rgba(244,247,251,.84);
      backdrop-filter:blur(16px);
      border-bottom:1px solid rgba(219,228,240,.72);
      margin:0 -14px 18px;
      padding:12px 14px;
    }

    .topbar-inner{
      width:min(var(--max),100%);
      margin:0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .user-pill{
      display:flex;
      align-items:center;
      gap:10px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:999px;
      padding:7px 10px;
      box-shadow:0 6px 14px rgba(15,23,42,.04);
      min-width:0;
    }

    .avatar{
      width:34px;
      height:34px;
      border-radius:50%;
      background:linear-gradient(135deg,#2563eb,#7c3aed);
      color:#fff;
      display:grid;
      place-items:center;
      font-weight:900;
      flex:0 0 auto;
    }

    .user-pill strong,.user-pill span{
      display:block;
      max-width:250px;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .user-pill strong{font-size:.92rem}
    .user-pill span{font-size:.78rem;color:var(--muted)}

    .top-actions{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .nav{
      display:flex;
      gap:8px;
      overflow:auto;
      padding:0 0 12px;
      margin-bottom:4px;
      -webkit-overflow-scrolling:touch;
    }

    .nav button{
      border:1px solid var(--line);
      background:#fff;
      color:#334155;
      border-radius:999px;
      padding:10px 14px;
      font-weight:800;
      white-space:nowrap;
      min-height:42px;
      transition:.15s ease;
    }

    .nav button.active{
      background:var(--primary);
      border-color:var(--primary);
      color:#fff;
      box-shadow:0 10px 18px rgba(37,99,235,.18);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(12,1fr);
      gap:14px;
    }

    .col-12{grid-column:span 12}
    .col-8{grid-column:span 8}
    .col-6{grid-column:span 6}
    .col-4{grid-column:span 4}
    .col-3{grid-column:span 3}

    .card{
      background:rgba(255,255,255,.95);
      border:1px solid rgba(219,228,240,.96);
      border-radius:var(--radius);
      box-shadow:var(--shadow-soft);
      padding:16px;
    }

    .card-title{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
    }

    .card h2,.card h3{
      margin:0;
      line-height:1.25;
    }

    .card h2{font-size:1.12rem}
    .card h3{font-size:1rem}
    .card p{line-height:1.6}

    .stat{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .stat-icon{
      width:44px;
      height:44px;
      border-radius:16px;
      display:grid;
      place-items:center;
      background:var(--primary-soft);
      color:var(--primary);
      font-weight:900;
      flex:0 0 auto;
    }

    .stat-value{
      font-size:1.55rem;
      font-weight:900;
      line-height:1;
    }

    .stat-label{
      color:var(--muted);
      font-size:.9rem;
      margin-top:4px;
    }

    .list{
      display:grid;
      gap:10px;
    }

    .item{
      border:1px solid var(--line);
      background:#fff;
      border-radius:16px;
      padding:12px;
      transition:.15s ease;
    }

    .item:hover{box-shadow:0 8px 18px rgba(15,23,42,.05)}

    .item-row{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
    }

    .item-title{
      font-weight:900;
      margin:0 0 4px;
    }

    .item-meta{
      color:var(--muted);
      font-size:.86rem;
      line-height:1.45;
    }

    .item-content{
      margin:8px 0 0;
      color:#334155;
      line-height:1.55;
      white-space:pre-wrap;
      word-break:break-word;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:5px;
      border-radius:999px;
      padding:5px 9px;
      font-weight:800;
      font-size:.78rem;
      background:#e2e8f0;
      color:#334155;
      white-space:nowrap;
    }

    .badge-blue{background:#dbeafe;color:#1e40af}
    .badge-green{background:#dcfce7;color:#166534}
    .badge-yellow{background:#fef3c7;color:#92400e}
    .badge-red{background:#fee2e2;color:#991b1b}
    .badge-purple{background:#ede9fe;color:#5b21b6}

    .split{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
    }

    .toolbar{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
      margin-bottom:12px;
    }

    .notice{
      border:1px solid #bfdbfe;
      background:#eff6ff;
      color:#1e3a8a;
      border-radius:16px;
      padding:12px;
      line-height:1.55;
      margin-bottom:12px;
    }

    .notice.warn{
      border-color:#fde68a;
      background:#fffbeb;
      color:#92400e;
    }

    .notice.danger{
      border-color:#fecaca;
      background:#fef2f2;
      color:#991b1b;
    }

    .table-wrap{
      width:100%;
      overflow:auto;
      border:1px solid var(--line);
      border-radius:16px;
      background:#fff;
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:720px;
    }

    th,td{
      padding:11px 12px;
      border-bottom:1px solid var(--line);
      text-align:left;
      vertical-align:top;
      font-size:.92rem;
    }

    th{
      background:#f8fafc;
      font-size:.8rem;
      color:#475569;
      text-transform:uppercase;
      letter-spacing:.04em;
    }

    tr:last-child td{border-bottom:0}

    .modal-backdrop{
      position:fixed;
      inset:0;
      z-index:100;
      background:rgba(15,23,42,.46);
      display:grid;
      place-items:center;
      padding:16px;
    }

    .modal{
      width:min(600px,100%);
      max-height:min(86vh,760px);
      overflow:auto;
      background:#fff;
      border-radius:24px;
      border:1px solid var(--line);
      box-shadow:0 24px 70px rgba(15,23,42,.24);
      padding:18px;
    }

    .modal-head{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:12px;
      margin-bottom:12px;
    }

    .modal-head h2{
      margin:0;
      font-size:1.16rem;
      line-height:1.25;
    }

    .close{
      border:0;
      background:#f1f5f9;
      width:38px;
      height:38px;
      border-radius:50%;
      font-size:1.2rem;
      line-height:1;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      z-index:200;
      width:min(540px,calc(100% - 28px));
      background:#0f172a;
      color:#fff;
      border-radius:16px;
      padding:12px 14px;
      box-shadow:0 18px 44px rgba(15,23,42,.28);
      display:flex;
      gap:10px;
      align-items:flex-start;
      line-height:1.45;
    }

    .toast.error{background:#991b1b}
    .toast.success{background:#166534}
    .toast.warn{background:#92400e}

    .loader{
      width:18px;
      height:18px;
      border-radius:50%;
      border:3px solid rgba(255,255,255,.4);
      border-top-color:#fff;
      animation:spin .8s linear infinite;
      flex:0 0 auto;
      margin-top:1px;
    }

    @keyframes spin{to{transform:rotate(360deg)}}

    .empty{
      color:var(--muted);
      text-align:center;
      padding:24px 10px;
      border:1px dashed var(--line);
      border-radius:16px;
      background:#f8fafc;
    }

    .footer-note{
      margin:24px 0 0;
      color:var(--muted);
      font-size:.86rem;
      text-align:center;
      line-height:1.55;
    }

    @media (max-width:900px){
      .grid{grid-template-columns:1fr}
      .col-12,.col-8,.col-6,.col-4,.col-3{grid-column:span 1}
      .split{grid-template-columns:1fr}
      .topbar-inner{align-items:flex-start}
      .top-actions .optional{display:none}
      .user-pill strong,.user-pill span{max-width:160px}
    }

    @media (max-width:560px){
      .app-shell{width:calc(100% - 20px);padding-top:10px}
      .login-card{padding:18px;border-radius:22px}
      .topbar{margin:0 -10px 14px;padding:10px}
      .topbar-inner{gap:8px}
      .brand h1{font-size:1.18rem}
      .brand-mark{width:42px;height:42px;border-radius:14px}
      .card{padding:13px;border-radius:17px}
      .btn{padding:10px 12px}
      .top-actions{gap:6px}
      .user-pill{padding:6px 8px}
      .avatar{width:32px;height:32px}
    }
  </style>
</head>

<body>
  <div id="toastRoot"></div>

  <!-- LOGIN -->
  <main id="loginView" class="login-wrap">
    <section class="login-card">
      <div class="brand">
        <div class="brand-mark">CN</div>
        <div>
          <h1>Sổ chủ nhiệm số</h1>
          <p>Kết nối GVCN, học sinh và cha mẹ học sinh</p>
        </div>
      </div>

      <div id="loginNotice" class="notice hidden"></div>

      <form id="loginForm" class="form-grid">
        <div class="field">
          <label for="username">Tài khoản</label>
          <input id="username" class="input" autocomplete="username" placeholder="Ví dụ: gvcn01, 8A01, ph_8A01" />
        </div>

        <div class="field">
          <label for="password">Mật khẩu</label>
          <input id="password" class="input" type="password" autocomplete="current-password" placeholder="Nhập mật khẩu" />
        </div>

        <button class="btn btn-primary full" type="submit">Đăng nhập</button>

        <div class="login-actions">
          <button id="forgotBtn" type="button" class="link-btn">Quên mật khẩu?</button>
          <span class="muted">Mật khẩu ban đầu do GVCN cấp.</span>
        </div>
      </form>
    </section>
  </main>

  <!-- APP -->
  <main id="appView" class="hidden">
    <div class="topbar">
      <div class="topbar-inner">
        <div class="user-pill">
          <div id="userAvatar" class="avatar">CN</div>
          <div>
            <strong id="userName">Người dùng</strong>
            <span id="userRole">Vai trò</span>
          </div>
        </div>

        <div class="top-actions">
          <button id="installAppBtn" class="btn btn-soft btn-small hidden" type="button">📲 <span class="optional">Cài app</span></button>
          <button id="refreshBtn" class="btn btn-ghost btn-small" type="button">↻ <span class="optional">Làm mới</span></button>
          <button id="changePassBtn" class="btn btn-soft btn-small" type="button">🔐 <span class="optional">Đổi mật khẩu</span></button>
          <button id="logoutBtn" class="btn btn-danger btn-small" type="button">Đăng xuất</button>
        </div>
      </div>
    </div>

    <div class="app-shell">
      <nav id="nav" class="nav"></nav>

      <section id="dashboardPage" class="page"></section>
      <section id="studentsPage" class="page hidden"></section>
      <section id="profilePage" class="page hidden"></section>
      <section id="messagesPage" class="page hidden"></section>
      <section id="activitiesPage" class="page hidden"></section>
      <section id="aiSupportPage" class="page hidden"></section>
      <section id="resetPage" class="page hidden"></section>
      <section id="setupPage" class="page hidden"></section>
      <section id="aiStatsPage" class="page hidden"></section>

      <p class="footer-note">
        Dữ liệu chỉ phục vụ công tác chủ nhiệm cá nhân. Không công khai thông tin riêng tư của học sinh. <br><b>Phiên bản giao diện: V9 - Lưu chat AI + Cài app</b>
      </p>
    </div>
  </main>

  <div id="modalRoot" class="hidden"></div>

<script>
/* =========================================================
   CẤU HÌNH
   Thầy thay URL bên dưới bằng Web App URL của Apps Script.
   Ví dụ:
   const API_URL = 'https://script.google.com/macros/s/AKfycb.../exec';
========================================================= */
const API_URL = 'https://script.google.com/macros/s/AKfycby99lEV9vfHUsQagIUPxUJj7RZfPqZVekvTShfY6S8pfkcCy9sxF0k1-6wtIyuozki8/exec';

const LS_TOKEN = 'scn_token_v7';
const LS_USER = 'scn_user_v7';
const LS_LAST_PAGE = 'scn_last_page_v7';

const state = {
  token: localStorage.getItem(LS_TOKEN) || '',
  user: readJSON(localStorage.getItem(LS_USER), null),
  dashboard: null,
  students: [],
  messages: [],
  activities: [],
  setup: null,
  lastImportedAccounts: [],
  currentPage: localStorage.getItem(LS_LAST_PAGE) || 'dashboard',
  currentStudentID: ''
};

const $ = sel => document.querySelector(sel);
const $$ = sel => Array.from(document.querySelectorAll(sel));

document.addEventListener('DOMContentLoaded', init);

function init(){
  bindBaseEvents();

  if(!validApiUrl()){
    showLoginNotice('Thầy cần thay <b>API_URL</b> trong file index.html bằng Web App URL của Apps Script trước khi sử dụng.', 'warn');
  }

  if(state.token){
    bootSession();
  }else{
    showLogin();
  }

  setupInstallPrompt();
  registerServiceWorkerIfAny();
}

function bindBaseEvents(){
  $('#loginForm').addEventListener('submit', onLogin);
  $('#forgotBtn').addEventListener('click', openForgotPasswordModal);
  $('#logoutBtn').addEventListener('click', logout);
  $('#changePassBtn').addEventListener('click', () => openChangePasswordModal(false));
  $('#refreshBtn').addEventListener('click', refreshCurrent);
  const installBtn = $('#installAppBtn');
  if(installBtn) installBtn.addEventListener('click', installApp);
}

function validApiUrl(){
  return API_URL && API_URL.startsWith('http') && !API_URL.includes('DAN_WEB_APP_URL');
}

/* =========================================================
   API
========================================================= */

async function api(action, data = {}){
  if(!validApiUrl()){
    throw new Error('Chưa cấu hình API_URL trong index.html.');
  }

  const payload = { action, data };

  let res;
  try{
    res = await fetch(API_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'text/plain;charset=utf-8'
      },
      body: JSON.stringify(payload),
      redirect: 'follow'
    });
  }catch(err){
    throw new Error('Không kết nối được backend. Nếu chạy trên GitHub Pages bị CORS, ta sẽ thêm Cloudflare Worker proxy.');
  }

  let json;
  try{
    json = await res.json();
  }catch(err){
    throw new Error('Backend không trả về JSON hợp lệ. Kiểm tra Web App URL hoặc quyền truy cập Apps Script.');
  }

  if(!json.ok){
    throw new Error(json.error || 'Có lỗi xảy ra.');
  }

  return json.data;
}

async function withLoading(fn, text='Đang xử lí...'){
  const id = showToast(text, 'loading', 30000);
  try{
    const result = await fn();
    hideToast(id);
    return result;
  }catch(err){
    hideToast(id);
    showToast(err.message || String(err), 'error', 5200);
    throw err;
  }
}

/* =========================================================
   LOGIN / SESSION
========================================================= */

async function onLogin(e){
  e.preventDefault();

  const username = $('#username').value.trim();
  const password = $('#password').value;

  if(!username || !password){
    showToast('Vui lòng nhập tài khoản và mật khẩu.', 'warn');
    return;
  }

  await withLoading(async () => {
    const data = await api('login', {
      username,
      password,
      deviceInfo: getDeviceInfo()
    });

    state.token = data.token;
    state.user = data.user;
    normalizeCurrentUserRole();
    localStorage.setItem(LS_TOKEN, state.token);
    localStorage.setItem(LS_USER, JSON.stringify(state.user));

    showApp();

    if(data.mustChangePassword || String(data.user.MustChangePassword).toUpperCase() === 'TRUE'){
      openChangePasswordModal(true);
    }

    await loadDashboard();
  }, 'Đang đăng nhập...');
}

async function bootSession(){
  try{
    await withLoading(async () => {
      const me = await api('me', { token: state.token });
      state.user = me.user;
      normalizeCurrentUserRole();
      localStorage.setItem(LS_USER, JSON.stringify(state.user));
      showApp();
      await loadDashboard();
    }, 'Đang mở phiên đăng nhập...');
  }catch(err){
    const msg = String(err && err.message ? err.message : err);
    if(msg.includes('hết hạn') || msg.includes('không hợp lệ') || msg.includes('không còn hoạt động')){
      clearSession();
      showLogin();
    }else if(state.user){
      showApp();
      showToast('Tạm thời chưa kiểm tra được phiên đăng nhập, hệ thống vẫn giữ đăng nhập trên thiết bị này. Hãy bấm Làm mới sau.', 'warn', 6500);
    }else{
      showLogin();
    }
  }
}

function showLogin(){
  $('#loginView').classList.remove('hidden');
  $('#appView').classList.add('hidden');
}

function showApp(){
  $('#loginView').classList.add('hidden');
  $('#appView').classList.remove('hidden');
  renderUser();
  renderNav();
}

function clearSession(){
  state.token = '';
  state.user = null;
  state.dashboard = null;
  state.students = [];
  state.messages = [];
  localStorage.removeItem(LS_TOKEN);
  localStorage.removeItem(LS_USER);
}

async function logout(){
  if(!state.token){
    clearSession();
    showLogin();
    return;
  }

  await withLoading(async () => {
    try{
      await api('logout', { token: state.token });
    }catch(e){}
    clearSession();
    showLogin();
    showToast('Đã đăng xuất.', 'success');
  }, 'Đang đăng xuất...');
}

function renderUser(){
  if(!state.user) return;

  $('#userName').textContent = state.user.FullName || state.user.Username || 'Người dùng';
  const role = normalizeRole(state.user.Role);
  $('#userRole').textContent = roleLabel(role) + (state.user.StudentID ? ' · ' + state.user.StudentID : '');
  $('#userAvatar').textContent = avatarText(state.user.FullName || state.user.Username || 'CN');
}

========================================================= */

function renderNav(){
  const role = normalizeRole(state.user?.Role);
  const items = [
    { id:'dashboard', label:'Tổng quan', show:true },
    { id:'students', label:'Học sinh', show:role === 'GVCN' },
    { id:'profile', label:role === 'GVCN' ? 'Hồ sơ' : (role === 'PHHS' ? 'Hồ sơ của con' : 'Hồ sơ của em'), show:true },
    { id:'messages', label:'Tin nhắn', show:true },
    { id:'activities', label:'Các hoạt động chính', show:true },
    { id:'aiSupport', label: role === 'PHHS' ? 'AI hỗ trợ PHHS' : 'AI hỗ trợ em', show: role !== 'GVCN' },
    { id:'reset', label:'Quên mật khẩu', show:role === 'GVCN' },
    { id:'setup', label:'Thiết lập', show:role === 'GVCN' },
    { id:'aiStats', label:'Thống kê AI', show:role === 'GVCN' }
  ].filter(i => i.show);

  $('#nav').innerHTML = items.map(i => `
    <button type="button" data-page="${i.id}" class="${state.currentPage === i.id ? 'active' : ''}">
      ${escapeHTML(i.label)}
    </button>
  `).join('');

  $$('#nav button').forEach(btn => {
    btn.addEventListener('click', () => goPage(btn.dataset.page));
  });

  goPage(state.currentPage, false);
}

async function goPage(page, save=true){
  if(!['dashboard','students','profile','messages','activities','aiSupport','reset','setup','aiStats'].includes(page)) page = 'dashboard';

  if(page === 'students' && normalizeRole(state.user.Role) !== 'GVCN') page = 'dashboard';
  if(page === 'aiSupport' && normalizeRole(state.user.Role) === 'GVCN') page = 'dashboard';
  if(page === 'reset' && normalizeRole(state.user.Role) !== 'GVCN') page = 'dashboard';
  if(page === 'setup' && normalizeRole(state.user.Role) !== 'GVCN') page = 'dashboard';
  if(page === 'aiStats' && normalizeRole(state.user.Role) !== 'GVCN') page = 'dashboard';

  state.currentPage = page;
  if(save) localStorage.setItem(LS_LAST_PAGE, page);

  $$('.page').forEach(p => p.classList.add('hidden'));
  $('#' + page + 'Page').classList.remove('hidden');

  $$('#nav button').forEach(btn => btn.classList.toggle('active', btn.dataset.page === page));

  if(page === 'dashboard') await loadDashboard();
  if(page === 'students') await loadStudents();
  if(page === 'profile') await openDefaultProfile();
  if(page === 'messages') await loadMessages();
  if(page === 'activities') await loadActivities();
  if(page === 'aiSupport') renderAISupportPage();
  if(page === 'reset') await loadResetRequests();
  if(page === 'setup') await loadSetup();
  if(page === 'aiStats') await loadAIStats();
}

async function refreshCurrent(){
  await goPage(state.currentPage, false);
}

  if(normalizeRole(state.user.Role) === 'GVCN'){
    if(!state.currentStudentID && state.students.length){
      state.currentStudentID = state.students[0].StudentID;

    if(!state.currentStudentID){

    if(!state.currentStudentID){
      $('#profilePage').innerHTML = `

function clearChatHistory(id){
  const el = document.getElementById(id);
  if(el) el.innerHTML = '';
}

function appendChatMessage(id, who, text){
  const el = document.getElementById(id);
  if(!el) return;
  const isAI = who === 'ai';
  const div = document.createElement('div');
  div.className = 'item';
  div.style.background = isAI ? '#f8fafc' : '#eff6ff';
  div.innerHTML = `
    <div class="item-row">
      <p class="item-title">${isAI ? 'AI' : 'Bạn'}</p>
      <span class="badge ${isAI ? 'badge-purple' : 'badge-blue'}">${isAI ? 'Phản hồi' : 'Câu hỏi'}</span>
    </div>
    <div class="item-content">${escapeHTML(text || '')}</div>
  `;
  el.appendChild(div);
  div.scrollIntoView({behavior:'smooth', block:'end'});
}

function collectChatText(id){
  const el = document.getElementById(id);
  if(!el) return '';
  return Array.from(el.querySelectorAll('.item')).map(item => item.innerText.trim()).join('\n\n').slice(-6500);
}


function getAIChatStorageKey(suffix){
  const userID = state.user && state.user.UserID ? state.user.UserID : 'guest';
  return `${LS_AI_CHAT_PREFIX}_${userID}_${suffix}`;
}

function getTeacherChatKey(studentID){
  return getAIChatStorageKey(`GVCN_${studentID || 'none'}`);
}

function getPersonalChatKey(){
  const role = normalizeRole(state.user?.Role || '');
  const sid = state.user?.StudentID || 'none';
  return getAIChatStorageKey(`${role}_${sid}`);
}

function readChatMessages(id){
  const el = document.getElementById(id);
  if(!el) return [];
  return Array.from(el.querySelectorAll('.item')).map(item => {
    const title = item.querySelector('.item-title')?.textContent || '';
    const content = item.querySelector('.item-content')?.textContent || '';
    return {
      who: title.trim() === 'AI' ? 'ai' : 'user',
      text: content,
      time: new Date().toISOString()
    };
  }).filter(m => m.text);
}

function saveAIChatHistory(key, messages){
  try{
    localStorage.setItem(key, JSON.stringify((messages || []).slice(-30)));
  }catch(e){}
}

function loadAIChatHistory(key){
  try{
    const arr = JSON.parse(localStorage.getItem(key) || '[]');
    return Array.isArray(arr) ? arr : [];
  }catch(e){
    return [];
  }
}

function restoreChatHistory(targetId, key){
  const messages = loadAIChatHistory(key);
  if(!messages.length) return false;
  clearChatHistory(targetId);
  messages.forEach(m => appendChatMessage(targetId, m.who, m.text));
  return true;
}

function restoreTeacherAIChat(studentID){
  const key = getTeacherChatKey(studentID);
  if(restoreChatHistory('teacherAIChatHistory', key)){
    const wrap = $('#teacherAIChatWrap');
    if(wrap){
      wrap.classList.remove('hidden');
      wrap.dataset.caseId = 'CHAT_TIEP';
    }
  }
}

function restorePersonalAIChat(){
  const key = getPersonalChatKey();
  if(restoreChatHistory('personalAIChatHistory', key)){
    const wrap = $('#personalAIChatWrap');
    if(wrap) wrap.classList.remove('hidden');
  }
}

function clearSavedTeacherAIChat(studentID){
  localStorage.removeItem(getTeacherChatKey(studentID));
  clearChatHistory('teacherAIChatHistory');
  showToast('Đã xóa lịch sử chat AI trên thiết bị này.', 'success');
}

function clearSavedPersonalAIChat(){
  localStorage.removeItem(getPersonalChatKey());
  clearChatHistory('personalAIChatHistory');
  showToast('Đã xóa lịch sử chat AI trên thiết bị này.', 'success');
}

function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(() => showToast('Đã sao chép.', 'success'));
    return;
  }
  const ta = document.createElement('textarea');
  ta.value = text;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  ta.remove();
  showToast('Đã sao chép.', 'success');
}

function bindSetupForms(){
  $('#setupConfigForm').addEventListener('submit', async e => {
    e.preventDefault();
    await withLoading(async () => {
      await api('saveSetupConfig', {
        token: state.token,
        config: {
          APP_NAME: $('#cfgAppName').value.trim(),
          TEN_TRUONG: $('#cfgSchool').value.trim(),
          TEN_LOP: $('#cfgClass').value.trim(),
          TEN_GVCN: $('#cfgTeacher').value.trim(),
          SO_DIEN_THOAI_GVCN: $('#cfgTeacherPhone').value.trim(),
          DEFAULT_PASSWORD: $('#cfgDefaultPass').value.trim(),
          SESSION_DAYS: $('#cfgSessionDays').value.trim(),
          WEB_APP_URL: $('#cfgWebAppUrl').value.trim()
        }
      });
      showToast('Đã lưu thiết lập lớp.', 'success');
      await loadSetup();
    }, 'Đang lưu thiết lập...');
  });

  $('#aiSettingsForm').addEventListener('submit', async e => {
    e.preventDefault();
    await withLoading(async () => {
      await api('saveAISettings', {
        token: state.token,
        enabled: $('#aiEnabled').value,
        provider: $('#aiProvider').value,
        model: $('#aiModel').value.trim(),
        dailyLimit: $('#aiLimit').value.trim(),
        apiKey: $('#aiApiKey').value.trim()
      });
      showToast('Đã lưu cấu hình AI.', 'success');
      await loadSetup();
    }, 'Đang lưu cấu hình AI...');
  });

  $('#bulkImportForm').addEventListener('submit', async e => {
    e.preventDefault();
    const raw = $('#bulkRaw').value.trim();
    if(!raw){
      showToast('Vui lòng dán danh sách học sinh.', 'warn');
      return;
    }
    await withLoading(async () => {
      const data = await api('bulkImportStudents', {
        token: state.token,
        raw,
        defaultClassName: $('#bulkClass').value.trim(),
        defaultPassword: $('#bulkPassword').value.trim(),
        createAccounts: 'TRUE'
      });
      state.lastImportedAccounts = data.accounts || [];
      renderBulkResult(data);
      showToast(data.message || 'Đã nhập danh sách.', 'success', 5600);
    }, 'Đang nhập học sinh hàng loạt...');
  });
}

function renderBulkResult(data){
  const accounts = data.accounts || [];
  const errors = data.errors || [];
  $('#bulkResult').innerHTML = `
    <div class="notice ${errors.length ? 'warn' : ''}">
      ${escapeHTML(data.message || '')}
      ${accounts.length ? '<br>Danh sách tài khoản mới tạo đang hiển thị bên dưới. Nên sao chép/lưu lại ngay vì sau này không xem lại được mật khẩu.' : ''}
    </div>
    ${accounts.length ? accountTable(accounts, true) : ''}
    ${errors.length ? `
      <h3 style="margin:14px 0 8px">Dòng lỗi/bỏ qua</h3>
      <div class="table-wrap"><table><thead><tr><th>Dòng</th><th>Nội dung</th><th>Lỗi</th></tr></thead><tbody>
        ${errors.map(e => `<tr><td>${escapeHTML(e.line)}</td><td>${escapeHTML(e.content)}</td><td>${escapeHTML(e.error)}</td></tr>`).join('')}
      </tbody></table></div>
    ` : ''}
    ${accounts.length ? `<button class="btn btn-soft" style="margin-top:10px" onclick="copyAccountsFromImport()">Sao chép danh sách tài khoản mới</button>` : ''}
  `;
}

async function loadAccountList(){
  await withLoading(async () => {
    const data = await api('getAccountList', { token: state.token });
    $('#accountListBox').className = '';
    $('#accountListBox').innerHTML = `
      <div class="notice warn">${escapeHTML(data.note || 'Mật khẩu đã mã hóa nên không thể xem lại.')}</div>
      ${accountTable(data.accounts || [], false)}
      <button class="btn btn-soft" style="margin-top:10px" onclick="copyAccountListVisible()">Sao chép bảng tài khoản</button>
    `;
  }, 'Đang tải danh sách tài khoản...');
}

function accountTable(rows, includePassword){
  if(!rows.length) return '<div class="empty">Chưa có tài khoản.</div>';
  return `
    <div class="table-wrap"><table>
      <thead><tr>
        <th>Mã HS</th><th>Họ tên</th><th>Lớp</th><th>Tài khoản HS</th><th>Tài khoản PHHS</th>${includePassword ? '<th>Mật khẩu</th>' : ''}
      </tr></thead>
      <tbody>
        ${rows.map(r => `<tr>
          <td>${escapeHTML(r.StudentID || '')}</td>
          <td>${escapeHTML(r.FullName || '')}</td>
          <td>${escapeHTML(r.ClassName || '')}</td>
          <td>${escapeHTML(r.StudentUsername || '')}</td>
          <td>${escapeHTML(r.ParentUsername || '')}</td>
          ${includePassword ? `<td><b>${escapeHTML(r.DefaultPassword || '')}</b></td>` : ''}
        </tr>`).join('')}
      </tbody>
    </table></div>
  `;
}

function copyAccountsFromImport(){
  const rows = state.lastImportedAccounts || [];
  if(!rows.length){ showToast('Không có tài khoản mới để sao chép.', 'warn'); return; }
  const text = ['MaHocSinh\tHoTenHocSinh\tLop\tTaiKhoanHS\tTaiKhoanPHHS\tMatKhauMacDinh']
    .concat(rows.map(r => [r.StudentID,r.FullName,r.ClassName,r.StudentUsername,r.ParentUsername,r.DefaultPassword].map(v => String(v || '')).join('\t')))
    .join('\n');
  copyText(text);
}

function copyAccountListVisible(){
  const trs = Array.from(document.querySelectorAll('#accountListBox table tr'));
  if(!trs.length){ showToast('Chưa có bảng tài khoản để sao chép.', 'warn'); return; }
  const text = trs.map(tr => Array.from(tr.children).map(td => td.textContent.trim()).join('\t')).join('\n');
  copyText(text);
}

async function loadActivities(){
  await withLoading(async () => {
    const data = await api('getActivities', { token: state.token });

function renderActivities(){
  const isTeacher = normalizeRole(state.user.Role) === 'GVCN';
  const rows = state.activities || [];

  const grouped = {};
  rows.forEach(a => {
    const key = `${a.SchoolYear || 'Chưa ghi năm học'} · Tháng ${a.Month || 'không ghi'}`;
    if(!grouped[key]) grouped[key] = [];
    grouped[key].push(a);
  });

  $('#activitiesPage').innerHTML = `
    <div class="grid">
      <div class="col-4">
        <div class="card">
          <h2>Các hoạt động chính</h2>
          <p class="muted">Ghi chú hoạt động theo tháng và hoạt động lớn trong năm của lớp. HS/PHHS có thể xem thông tin được công khai.</p>
          ${isTeacher ? `<button class="btn btn-primary full" onclick="openActivityModal()">+ Thêm hoạt động</button>` : ''}
          <div class="notice" style="margin-top:12px">
            GVCN có thể cập nhật kế hoạch, kết quả, trạng thái từng hoạt động để làm minh chứng công tác chủ nhiệm.
          </div>
        </div>
      </div>

      <div class="col-8">
        <div class="card">
          <div class="card-title">
            <div>
              <h2>Danh sách hoạt động</h2>
              <p class="muted" style="margin:.25rem 0 0">${rows.length} hoạt động đang hiển thị.</p>
            </div>
            <button class="btn btn-soft btn-small" onclick="loadActivities()">Làm mới</button>
          </div>

          ${rows.length ? Object.keys(grouped).map(key => `
            <h3 style="margin:18px 0 10px">${escapeHTML(key)}</h3>
            <div class="list">
              ${grouped[key].map(a => renderActivityItem(a, isTeacher)).join('')}
            </div>
          `).join('') : `<div class="empty">Chưa có hoạt động nào.</div>`}
        </div>
      </div>
    </div>
  `;
}

function renderActivityItem(a, isTeacher){
  return `
    <div class="item">
      <div class="item-row">
        <div>
          <p class="item-title">${escapeHTML(a.Title || 'Hoạt động')}</p>
          <div class="item-meta">
            ${escapeHTML(a.Type || 'Hoạt động lớp')} · ${escapeHTML(a.Audience || 'Tất cả')} · ${escapeHTML(formatDateTime(a.UpdatedAt || a.CreatedAt))}
          </div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end">
          ${activityStatusBadge(a.Status)}
          ${isTeacher ? `<button class="btn btn-soft btn-small" onclick="openActivityModal('${escapeJS(a.ActivityID)}')">Sửa</button>
          <button class="btn btn-danger btn-small" onclick="deleteActivity('${escapeJS(a.ActivityID)}')">Xóa</button>` : ''}
        </div>
      </div>
      ${a.Description ? `<div class="item-content"><b>Mô tả:</b> ${escapeHTML(a.Description)}</div>` : ''}
      ${a.Plan ? `<div class="item-content"><b>Kế hoạch/Ghi chú:</b> ${escapeHTML(a.Plan)}</div>` : ''}
      ${a.Result ? `<div class="item-content"><b>Kết quả:</b> ${escapeHTML(a.Result)}</div>` : ''}
    </div>
  `;
}

function activityStatusBadge(status){
  const s = String(status || 'Đang thực hiện');
  if(s.includes('Hoàn')) return `<span class="badge badge-green">${escapeHTML(s)}</span>`;
  if(s.includes('Chưa')) return `<span class="badge badge-yellow">${escapeHTML(s)}</span>`;
  if(s.includes('Hủy') || s.includes('xóa')) return `<span class="badge badge-red">${escapeHTML(s)}</span>`;
  return `<span class="badge badge-blue">${escapeHTML(s)}</span>`;
}

  $('#activityForm').addEventListener('submit', async e => {
    e.preventDefault();
    const title = $('#actTitle').value.trim();
    if(!title){
      showToast('Vui lòng nhập tiêu đề hoạt động.', 'warn');
      return;
    }

    await withLoading(async () => {
      await api('saveActivity', {
        token: state.token,
        activityID,
        schoolYear: $('#actSchoolYear').value.trim(),
        month: $('#actMonth').value,
        title,
        type: $('#actType').value,
        audience: $('#actAudience').value,
        status: $('#actStatus').value,
        description: $('#actDescription').value.trim(),
        plan: $('#actPlan').value.trim(),
        result: $('#actResult').value.trim()
      });
      closeModal();
      showToast('Đã lưu hoạt động.', 'success');
      await loadActivities();
    }, 'Đang lưu hoạt động...');
  });
}

async function deleteActivity(activityID){
  if(!confirm('Xóa hoạt động này khỏi danh sách hiển thị?')) return;
  await withLoading(async () => {
    await api('deleteActivity', { token: state.token, activityID });
    showToast('Đã xóa hoạt động.', 'success');
    await loadActivities();
  }, 'Đang xóa hoạt động...');
}

      <div class="col-3"><div class="card stat"><div class="stat-icon">✅</div><div><div class="stat-value">${escapeHTML(String(data.successCount || 0))}</div><div class="stat-label">Lượt thành công</div></div></div></div>

      <div class="col-6">
        <div class="card">
          <div class="card-title"><div><h2>Thống kê theo ngày</h2><p class="muted" style="margin:.25rem 0 0">14 ngày gần nhất có dữ liệu.</p></div></div>
          ${dateRows.length ? `<div class="table-wrap"><table><thead><tr><th>Ngày</th><th>Lượt</th></tr></thead><tbody>${dateRows.map(d => `<tr><td>${escapeHTML(d)}</td><td><b>${escapeHTML(String(byDate[d]))}</b></td></tr>`).join('')}</tbody></table></div>` : `<div class="empty">Chưa có dữ liệu.</div>`}

        <div class="card">

          ${typeRows.length ? `<div class="table-wrap"><table><thead><tr><th>Dạng hỗ trợ</th><th>Lượt</th></tr></thead><tbody>${typeRows.map(t => `<tr><td>${escapeHTML(t)}</td><td><b>${escapeHTML(String(bySupportType[t]))}</b></td></tr>`).join('')}</tbody></table></div>` : `<div class="empty">Chưa có dữ liệu.</div>`}
        </div>
      </div>

      <div class="col-12">
        <div class="card">
          <div class="card-title">
            <div><h2>Lịch sử lượt sử dụng gần đây</h2><p class="muted" style="margin:.25rem 0 0">Bảng này không có nội dung hỏi/đáp, chỉ có dữ liệu thống kê.</p></div>
            <button class="btn btn-soft btn-small" onclick="copyAIStatsVisible()">Sao chép bảng</button>
          </div>
          ${recent.length ? `<div id="aiStatsTable" class="table-wrap"><table><thead><tr><th>Thời điểm</th><th>Vai trò</th><th>Mã HS</th><th>Dạng hỗ trợ</th><th>Mức độ</th><th>Model</th><th>Kết quả</th></tr></thead><tbody>${recent.map(r => `<tr><td>${escapeHTML(formatDateTime(r.CreatedAt))}</td><td>${escapeHTML(r.Role || '')}</td><td>${escapeHTML(r.StudentID || '')}</td><td>${escapeHTML(r.SupportType || '')}</td><td>${escapeHTML(r.Level || '')}</td><td>${escapeHTML(r.Model || '')}</td><td>${escapeHTML(String(r.Success || ''))}</td></tr>`).join('')}</tbody></table></div>` : `<div class="empty">Chưa có lượt sử dụng AI của HS/PHHS.</div>`}
        </div>
      </div>
    </div>
  `;
}

function copyAIStatsVisible(){
  const trs = Array.from(document.querySelectorAll('#aiStatsTable table tr'));
  if(!trs.length){ showToast('Chưa có bảng thống kê để sao chép.', 'warn'); return; }
  const text = trs.map(tr => Array.from(tr.children).map(td => td.textContent.trim()).join('\t')).join('\n');
  copyText(text);
}

function openChangePasswordModal(force=false){
  const html = `
    <div class="modal-backdrop">
      <div class="modal">
        <div class="modal-head">
          <div>
            <h2>${force ? 'Cần đổi mật khẩu lần đầu' : 'Đổi mật khẩu'}</h2>
            <p class="muted" style="margin:.25rem 0 0">Mật khẩu mới nên có ít nhất 6 kí tự.</p>
          </div>
          ${force ? '' : '<button class="close" onclick="closeModal()">×</button>'}
        </div>

        ${force ? `<div class="notice warn">Tài khoản đang dùng mật khẩu ban đầu. Vui lòng đổi mật khẩu để tiếp tục sử dụng an toàn hơn.</div>` : ''}

        <form id="changePasswordForm" class="form-grid">
          <div class="field">
            <label>Mật khẩu cũ</label>
            <input id="oldPass" class="input" type="password" autocomplete="current-password" />
          </div>
          <div class="field">
            <label>Mật khẩu mới</label>
            <input id="newPass" class="input" type="password" autocomplete="new-password" />
          </div>
          <div class="field">
            <label>Nhập lại mật khẩu mới</label>
            <input id="newPass2" class="input" type="password" autocomplete="new-password" />
          </div>
          <button class="btn btn-primary full" type="submit">Lưu mật khẩu mới</button>
        </form>
      </div>
    </div>
  `;
  openModal(html);

  $('#changePasswordForm').addEventListener('submit', async e => {
    e.preventDefault();

    const oldPassword = $('#oldPass').value;
    const newPassword = $('#newPass').value;
    const newPassword2 = $('#newPass2').value;

    if(!oldPassword || !newPassword){
      showToast('Vui lòng nhập đủ mật khẩu cũ và mật khẩu mới.', 'warn');
      return;
    }
    if(newPassword.length < 6){
      showToast('Mật khẩu mới cần có ít nhất 6 kí tự.', 'warn');
      return;
    }
    if(newPassword !== newPassword2){
      showToast('Hai lần nhập mật khẩu mới chưa khớp.', 'warn');
      return;
    }

    await withLoading(async () => {
      await api('changePassword', {
        token: state.token,
        oldPassword,
        newPassword
      });
      state.user.MustChangePassword = 'FALSE';
      localStorage.setItem(LS_USER, JSON.stringify(state.user));
      closeModal();
      showToast('Đã đổi mật khẩu.', 'success');
    }, 'Đang đổi mật khẩu...');
  });

  $('#personalAIChatForm').addEventListener('submit', async e => {
    e.preventDefault();
    const question = $('#personalAIChatInput').value.trim();
    if(!question){
      showToast('Vui lòng nhập câu hỏi trao đổi tiếp.', 'warn');
      return;
    }

    await withLoading(async () => {
      $('#personalAIChatBtn').disabled = true;
      appendChatMessage('personalAIChatHistory', 'user', question);
      const previous = collectChatText('personalAIChatHistory');
      const data = await api('aiChatContinue', {
        token: state.token,
        mode: 'PERSONAL',
        supportType: $('#personalSupportType').value,
        mucDo: $('#personalLevel').value,
        question,
        previous
      });
      appendChatMessage('personalAIChatHistory', 'ai', data.response || '');
      saveAIChatHistory(getPersonalChatKey(), readChatMessages('personalAIChatHistory'));
      $('#personalAIChatInput').value = '';
      showToast(data.message || 'AI đã trả lời.', 'success');
    }, 'AI đang trả lời tiếp...').finally(() => {
      const btn = $('#personalAIChatBtn');
      if(btn) btn.disabled = false;
    });
  });
}

/* =========================================================
   MODAL / TOAST
========================================================= */

function openModal(html){
  $('#modalRoot').innerHTML = html;
  $('#modalRoot').classList.remove('hidden');
}

function closeModal(){
  $('#modalRoot').classList.add('hidden');
  $('#modalRoot').innerHTML = '';
}

function showToast(message, type='info', timeout=3600){
  const id = 'toast_' + Date.now() + '_' + Math.floor(Math.random()*999);
  const root = $('#toastRoot');
  const div = document.createElement('div');
  div.id = id;
  div.className = 'toast ' + (type === 'error' ? 'error' : type === 'success' ? 'success' : type === 'warn' ? 'warn' : '');
  div.innerHTML = `${type === 'loading' ? '<span class="loader"></span>' : ''}<div>${message}</div>`;
  root.appendChild(div);

  if(timeout){
    setTimeout(() => hideToast(id), timeout);
  }
  return id;
}

function hideToast(id){
  const el = document.getElementById(id);
  if(el) el.remove();
}

function showLoginNotice(html, type='info'){
  const el = $('#loginNotice');
  el.className = 'notice ' + (type === 'warn' ? 'warn' : type === 'danger' ? 'danger' : '');
  el.innerHTML = html;
  el.classList.remove('hidden');
}

/* =========================================================
   UTILS
========================================================= */


function normalizeRole(role){
  const r = String(role || '').trim().toUpperCase()
    .replace(/\s+/g,'')
    .replaceAll('Ọ','O').replaceAll('Ọ','O');
  const raw = String(role || '').trim().toLowerCase();

  if(r === 'GVCN' || raw.includes('giáo viên') || raw.includes('giao vien')) return 'GVCN';
  if(r === 'HS' || raw.includes('học sinh') || raw.includes('hoc sinh')) return 'HS';
  if(r === 'PHHS' || r === 'CMHS' || raw.includes('phụ huynh') || raw.includes('phu huynh') || raw.includes('cha mẹ') || raw.includes('cha me') || raw.includes('cmhs')) return 'PHHS';
  return String(role || '').trim();
}

function normalizeCurrentUserRole(){
  if(state.user && state.user.Role){
    state.user.Role = normalizeRole(state.user.Role);
  }
}

function roleLabel(role){
  return {
    GVCN:'Giáo viên chủ nhiệm',
    HS:'Học sinh',
    PHHS:'Cha mẹ học sinh'
  }[role] || role || 'Người dùng';
}

function avatarText(name){
  const parts = String(name || 'CN').trim().split(/\s+/);
  if(parts.length === 1) return parts[0].slice(0,2).toUpperCase();
  return (parts[parts.length-2][0] + parts[parts.length-1][0]).toUpperCase();
}

function formatDateTime(value){
  if(!value) return '—';
  const d = new Date(value);
  if(isNaN(d.getTime())) return String(value);
  return d.toLocaleString('vi-VN', { hour:'2-digit', minute:'2-digit', day:'2-digit', month:'2-digit', year:'numeric' });
}

function formatDate(value){
  if(!value) return '—';
  const d = new Date(value);
  if(isNaN(d.getTime())) return String(value);
  return d.toLocaleDateString('vi-VN');
}

function escapeHTML(str){
  return String(str ?? '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'",'&#039;');
}

function escapeJS(str){
  return String(str ?? '')
    .replaceAll('\\','\\\\')
    .replaceAll("'","\\'")
    .replaceAll('\n','\\n')
    .replaceAll('\r','');
}

function readJSON(str, fallback){
  try{return JSON.parse(str)}catch(e){return fallback}
}

function getDeviceInfo(){
  return `${navigator.platform || ''} · ${navigator.userAgent || ''}`.slice(0,300);
}

function levelBadge(level){
  const l = String(level || 'Bình thường');
  let cls = 'badge-blue';
  if(l.includes('theo dõi')) cls = 'badge-yellow';
  if(l.includes('gặp riêng') || l.includes('phối hợp')) cls = 'badge-purple';
  if(l.includes('Khẩn')) cls = 'badge-red';
  if(l.includes('Bình thường')) cls = 'badge-green';
  return `<span class="badge ${cls}">${escapeHTML(l)}</span>`;
}

function priorityBadge(priority){
  const p = String(priority || 'Bình thường');
  if(p === 'Khẩn') return `<span class="badge badge-red">Khẩn</span>`;
  if(p === 'Quan trọng') return `<span class="badge badge-yellow">Quan trọng</span>`;
  return `<span class="badge badge-green">Bình thường</span>`;
}


function setupInstallPrompt(){
  window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredInstallPrompt = e;
    const btn = $('#installAppBtn');
    if(btn) btn.classList.remove('hidden');
  });

  window.addEventListener('appinstalled', () => {
    deferredInstallPrompt = null;
    const btn = $('#installAppBtn');
    if(btn) btn.classList.add('hidden');
    showToast('Đã cài tiện ích vào thiết bị.', 'success');
  });
}

async function installApp(){
  if(deferredInstallPrompt){
    deferredInstallPrompt.prompt();
    await deferredInstallPrompt.userChoice;
    deferredInstallPrompt = null;
    const btn = $('#installAppBtn');
    if(btn) btn.classList.add('hidden');
    return;
  }

  openModal(`
    <div class="modal-backdrop">
      <div class="modal">
        <div class="modal-head">
          <div>
            <h2>Cài Sổ chủ nhiệm số</h2>
            <p class="muted" style="margin:.25rem 0 0">Trình duyệt chưa hiện nút cài tự động. Thầy/cô có thể cài thủ công.</p>
          </div>
          <button class="close" onclick="closeModal()">×</button>
        </div>
        <div class="notice">
          <b>Trên điện thoại Android/Chrome:</b><br>
          Bấm nút ba chấm ⋮ của trình duyệt → chọn <b>Thêm vào màn hình chính</b> hoặc <b>Cài đặt ứng dụng</b>.
        </div>
        <div class="notice">
          <b>Trên máy tính Chrome/Edge:</b><br>
          Bấm biểu tượng cài đặt ở thanh địa chỉ nếu có, hoặc mở menu ⋮ → <b>Lưu và chia sẻ</b> → <b>Cài đặt trang này làm ứng dụng</b>.
        </div>
        <div class="notice warn">
          Nên dùng link HTTPS để trình duyệt cho phép cài ứng dụng.
        </div>
      </div>
    </div>
  `);
}

function registerServiceWorkerIfAny(){
  if('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(() => {
        // Bản hiện tại chưa bắt buộc có service-worker.js.
      });
    });
  }
}
